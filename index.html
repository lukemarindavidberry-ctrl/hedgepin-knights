); }\n    function show() {\n      camp.classList.add('on'); screen && (cardEl.scrollTop = 0);\n      window.__missionLive = false;\n      var h = document.getElementById('onb-help'); if (h) h.classList.remove('on');\n    }\n    function hide() { camp.classList.remove('on'); }\n    function clone(o) { return JSON.parse(JSON.stringify(o)); }\n\n    // procedural hero roundel — mirrors the in-game hero cell (disc + quill spokes\n    // + accent core), so the front-of-house portraits match the playfield exactly.\n    function roundel(id, S) {\n      var H = C.heroes()[id];\n      var c = S / 2, R = S * 0.40, si = R * 0.9, so = R * 1.16, ir = R * 0.46, sp = '';\n      for (var k = 0; k < 11; k++) {\n        var a = k / 11 * Math.PI * 2;\n        sp += '<line x1=\"' + (c + Math.cos(a) * si).toFixed(1) + '\" y1=\"' + (c + Math.sin(a) * si).toFixed(1) +\n              '\" x2=\"' + (c + Math.cos(a) * so).toFixed(1) + '\" y2=\"' + (c + Math.sin(a) * so).toFixed(1) + '\"/>';\n      }\n      return '<svg class=\"camp-roundel\" width=\"' + S + '\" height=\"' + S + '\" viewBox=\"0 0 ' + S + ' ' + S + '\">' +\n        '<circle cx=\"' + c + '\" cy=\"' + c + '\" r=\"' + R + '\" fill=\"' + H.color + '\" stroke=\"' + H.colorD + '\" stroke-width=\"2\"/>' +\n        '<g stroke=\"' + H.colorD + '\" stroke-width=\"1.8\" stroke-linecap=\"round\">' + sp + '<\u002Fg>' +\n        '<circle cx=\"' + c + '\" cy=\"' + c + '\" r=\"' + ir + '\" fill=\"' + H.accent + '\"/><\u002Fsvg>';\n    }\n    function noteIcon() {\n      return '<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#BC5B38\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l2.4 5 5.6.6-4.2 3.7 1.3 5.5L12 20.5 6.9 17.8l1.3-5.5L4 8.6 9.6 8z\"/><\u002Fsvg>';\n    }\n    // back-to-title nav button — arrow + explicit \"Main menu\" so it's obvious it\n    // leaves the campaign and returns to the start screen.\n    function menuBtn() {\n      return '<button class=\"onb-btn back\" data-title aria-label=\"Back to main menu\">' +\n        '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"/><\u002Fsvg>' +\n        'Main menu<\u002Fbutton>';\n    }\n\n    // profiles already shown (so retries / replays don't re-introduce a hero)\n    var PROF_KEY = 'hk_profiles_v1';\n    function profilesSeen() { try { return JSON.parse(localStorage.getItem(PROF_KEY) || '[]'); } catch (e) { return []; } }\n    function profileSeen(id) { return profilesSeen().indexOf(id) >= 0; }\n    function markProfile(id) { var a = profilesSeen(); if (a.indexOf(id) < 0) { a.push(id); try { localStorage.setItem(PROF_KEY, JSON.stringify(a)); } catch (e) {} } }\n\n    function massLabel(id) { var d = C.heroes()[id].density; return d >= 0.005 ? 'high' : d >= 0.0035 ? 'medium' : 'low'; }\n    function boostLabel(id) { var b = C.heroes()[id].boostMul; return b >= 1.1 ? 'high' : b >= 0.95 ? 'medium' : 'low'; }\n    function energyVal(id) { return Math.round(100 * C.heroes()[id].energyMul); }\n\n    // ── BRIEFING ────────────────────────────────────────────────\n    function openBriefing() {\n      screen = 'briefing';\n      var m = C.missions()[cur];\n      var heroes = C.heroes();\n      var dispatch = (style !== 'portrait');\n      var lines = '';\n      if (dispatch) {\n        for (var i = 0; i < m.dialogue.length; i++) {\n          var d = m.dialogue[i], H = heroes[d.who];\n          lines += '<div class=\"camp-line\">' + roundel(d.who, 44) +\n            '<div class=\"camp-line-body\"><span class=\"camp-name\">' + esc(H.name) +\n            (d.aside ? ' <em>\\u2014 ' + esc(d.aside) + '<\u002Fem>' : '') + '<\u002Fspan>' +\n            '<div class=\"camp-quote\">\\u201c' + esc(d.text) + '\\u201d<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n        }\n        lines = '<div class=\"camp-dispatch\">' + lines + '<\u002Fdiv>';\n      } else {\n        for (var j = 0; j c(opt.name) + '\"><\u002Fdiv>' +\n        '<div class=\"camp-ab-meta\"><div class=\"camp-ab-name\">' + esc(opt.name) + '<\u002Fdiv>' +\n        '<div class=\"camp-ab-desc\">' + esc(opt.desc) + '<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n    }\n    function openLoadout() {\n      screen = 'loadout';\n      var m = C.missions()[cur];\n      if (!loadoutHero || m.roster.indexOf(loadoutHero) < 0) loadoutHero = m.roster[0];\n      renderLoadout();\n      show();\n    }\n    function renderLoadout() {\n      var m = C.missions()[cur], heroes = C.heroes(), defs = C.loadoutDefs();\n      var id = loadoutHero, H = heroes[id], L = defs[id];\n      if (!picks[id]) picks[id] = clone(C.progress().loadouts[id]);\n      var tabs = '';\n      if (m.roster.length > 1) {\n        for (var i = 0; i < m.roster.length; i++) {\n          var rid = m.roster[i];\n          tabs += '<div class=\"camp-tab' + (rid === id ? ' active' : '') + '\" data-hero=\"' + rid + '\">' +\n            roundel(rid, 34) + '<span class=\"t-name\">' + esc(heroes[rid].name) + '<\u002Fspan><\u002Fdiv>';\n        }\n        tabs = '<div class=\"camp-tabs\">' + tabs + '<\u002Fdiv>';\n      }\n      var physCards = '', statCards = '';\n      for (var p = 0; p < L.phys.length; p++) physCards += abilityCard(id, 'phys', L.phys[p]);\n      for (var s = 0; s < L.stat.length; s++) statCards += abilityCard(id, 'stat', L.stat[s]);\n      var physName = (L.phys.find(function (o) { return o.id === picks[id].phys; }) || {}).name || '\\u2014';\n      var statName = (L.stat.find(function (o) { return o.id === picks[id].stat; }) || {}).name || '\\u2014';\n      cardEl.className = 'camp-card';\n      cardEl.innerHTML =\n        '<div class=\"camp-eyebrow\">' + esc(m.eyebrow) + ' \\u00b7 Loadout<\u002Fdiv>' +\n        '<div class=\"camp-title\">Choose your loadout<\u002Fdiv>' +\n        '<div class=\"camp-place\">' + (m.roster.length > 1 ? 'Set each knight before you launch.' : 'One knight on the line today.') + '<\u002Fdiv>' +\n        '<div class=\"camp-noteff\"><span class=\"ne-tag\">Not in effect<\u002Fspan>' +\n          '<span class=\"ne-txt\">Ability picks are a v2 surface \\u2014 they don\\u2019t change this prototype build. Shown for layout only.<\u002Fspan><\u002Fdiv>' +\n        tabs +\n        '<div class=\"camp-profile-head\" style=\"margin-top:4px\">' + roundel(id, 64) +\n          '<div><div class=\"camp-ab-name\" style=\"font-size:21px\">' + esc(H.name) + '<\u002Fdiv>' +\n          '<div class=\"camp-role\" style=\"font-size:13px\">' + esc(H.role) + '<\u002Fdiv><\u002Fdiv><\u002Fdiv>' +\n        '<div class=\"camp-loadrow\"><div class=\"camp-rowhead\">Physics-effect ability <em>pick one<\u002Fem><\u002Fdiv>' +\n          '<div class=\"camp-abilities\">' + physCards + '<\u002Fdiv><\u002Fdiv>' +\n        '<div class=\"camp-loadrow\"><div class=\"camp-rowhead\">Status / stat ability <em>pick one<\u002Fem><\u002Fdiv>' +\n          '<div class=\"camp-abilities\">' + statCards + '<\u002Fdiv><\u002Fdiv>' +\n        '<div class=\"camp-foot\">' +\n          '<button class=\"onb-btn ghost\" data-back>Back<\u002Fbutton><div class=\"spacer\"><\u002Fdiv>' +\n          '<button class=\"onb-btn primary\" data-start>Begin mission \\u25b8<\u002Fbutton>' +\n        '<\u002Fdiv>';\n      cardEl.scrollTop = 0;\n      var tabsEls = cardEl.querySelectorAll('[data-hero]');\n      for (var k = 0; k < tabsEls.length; k++) tabsEls[k].onclick = function () { loadoutHero = this.getAttribute('data-hero'); renderLoadout(); };\n      var abEls = cardEl.querySelectorAll('.camp-ability[data-id]');\n      for (var a = 0; a < abEls.length; a++) abEls[a].onclick = function () {\n        picks[id][this.getAttribute('data-row')] = this.getAttribute('data-id'); renderLoadout();\n      };\n      cardEl.querySelector('[data-back]').onclick = openBriefing;\n      cardEl.querySelector('[data-start]').onclick = startMission;\n    }\n\n    // ── START / WIN / LOSE ─────────────────────────────────────────\n    function startMission() {\n      var m = C.missions()[cur];\n      for (var i = 0; i < m.roster.length; i++) { var rid = m.roster[i]; if (picks[rid]) C.setLoadout(rid, picks[rid]); }\n      hide();\n      window.__missionLive = true;\n      C.start(cur, picks);\n      // first-ever mission: run the spotlight tutorial over the now-live field\n      if (mode === 'first' && cur === 0 && window.__hkTour && !window.__hkTour.seen()) {\n        setTimeout(function () { window.__hkTour.run('intro'); }, 80);\n      }\n    }\n\n    function statline(st) {\n      return '<div class=\"camp-statline\">' +\n        '<div class=\"s\"><b>' + st.kills + '<\u002Fb><span>kills<\u002Fspan><\u002Fdiv>' +\n        '<div class=\"s\"><b>' + st.chains + '<\u002Fb><span>chains<\u002Fspan><\u002Fdiv>' +\n        '<div class=\"s\"><b>' + st.breaches + '<\u002Fb><span>breaches<\u002Fspan><\u002Fdiv><\u002Fdiv>';\n    }\n\n    window.__onMissionWin = function () {\n      window.__missionLive = false;\n      var st = (window.__stats && window.__stats()) || { kills: 0, chains: 0, breaches: 0 };\n      var wasLast = C.active().isLast;\n      var prog = C.complete(cur);           // persist: advance unlock pointer\n      var missions = C.missions();\n      var unlock = '';\n      if (!wasLast) {\n        var nm = missions[cur + 1];\n        if (nm && nm.newHero) {\n          var nh = C.heroes()[nm.newHero];\n          unlock = '<div class=\"camp-unlock\">' + roundel(nm.newHero, 46) +\n            '<div><div class=\"u-ey\">New knight \\u2014 Mission ' + (cur + 2) + '<\u002Fdiv>' +\n            '<div class=\"u-name\">' + esc(nh.name) + '<\u002Fdiv><div class=\"u-desc\">' + esc(nh.role) + '<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n        } else if (nm && nm.newEnemy) {\n          var ne = C.enemies()[nm.newEnemy];\n          unlock = '<div class=\"camp-unlock\">' +\n            '<div><div class=\"u-ey\">New threat \\u2014 Mission ' + (cur + 2) + '<\u002Fdiv>' +\n            '<div class=\"u-name\">' + esc(ne.name) + '<\u002Fdiv><div class=\"u-desc\">it marches with the next wave<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n        }\n      }\n      cardEl.className = 'camp-card result';\n      cardEl.innerHTML =\n        '<div class=\"camp-result-kicker\">Mission ' + (cur + 1) + ' cleared<\u002Fdiv>' +\n        '<div class=\"camp-result-title held\">The line held<\u002Fdiv>' +\n        '<div class=\"camp-result-sub\">' + esc(C.missions()[cur].name) + ' \\u2014 every wave repelled.<\u002Fdiv>' +\n        statline(st) + unlock +\n        '<div class=\"camp-foot\">' +\n          (wasLast\n            ? '<button class=\"onb-btn primary\" data-finale>See the result \\u25b8<\u002Fbutton>'\n            : '<button class=\"onb-btn primary\" data-next>Next: Mission ' + (cur + 2) + ' \\u25b8<\u002Fbutton>') +\n          '<div class=\"spacer\"><\u002Fdiv>' +\n          menuBtn() +\n        '<\u002Fdiv>';\n      cardEl.scrollTop = 0;\n      var nb = cardEl.querySelector('[data-next]'); if (nb) nb.onclick = function () { mode = 'continue'; cur = prog.current; openBriefing(); };\n      var fb = cardEl.querySelector('[data-finale]'); if (fb) fb.onclick = showFinale;\n      cardEl.querySelector('[data-title]').onclick = toTitle;\n      show();\n    };\n\n    window.__onMissionLose = function () {\n      window.__missionLive = false;\n      var st = (window.__stats && window.__stats()) || { kills: 0, chains: 0, breaches: 0 };\n      cardEl.className = 'camp-card result';\n      cardEl.innerHTML =\n        '<div class=\"camp-result-kicker\">The location fell<\u002Fdiv>' +\n        '<div class=\"camp-result-title fell\">Too many breached<\u002Fdiv>' +\n        '<div class=\"camp-result-sub\">They came uphill. Try chaining them at the gap \\u2014 don\\u2019t poke.<\u002Fdiv>' +\n        statline(st) +\n        '<div class=\"camp-foot\">' +\n          '<button class=\"onb-btn primary\" data-retry>Retry mission \\u25b8<\u002Fbutton>' +\n          '<button class=\"onb-btn ghost\" data-load>Change loadout<\u002Fbutton>' +\n        '<\u002Fdiv>';\n      cardEl.scrollTop = 0;\n      cardEl.querySelector('[data-retry]').onclick = function () { hide(); window.__missionLive = true; C.start(cur, picks); };\n      cardEl.querySelector('[data-load]').onclick = openLoadout;\n      show();\n    };\n\n    function showFinale() {\n      screen = 'finale';\n      cardEl.className = 'camp-card result';\n      cardEl.innerHTML =\n        '<div class=\"camp-result-kicker\">Campaign complete<\u002Fdiv>' +\n        '<div class=\"camp-result-title held\">The terraces hold<\u002Fdiv>' +\n        '<div class=\"camp-result-sub\">Five terraces, one line. The vents are quiet \\u2014 for now.<\u002Fdiv>' +\n        '<div class=\"camp-foot\">' +\n          '<button class=\"onb-btn primary\" data-title>Return to title<\u002Fbutton>' +\n        '<\u002Fdiv>';\n      cardEl.scrollTop = 0;\n      cardEl.querySelector('[data-title]').onclick = toTitle;\n      show();\n    }\n\n    // ── MISSION SELECT ───────────────────────────────────────────\n    // Lets a returning player replay any terrace they've reached. Reached/cleared\n    // missions and the current furthest-unlocked one are playable; future ones are\n    // locked (dashed). Replaying never regresses progress (C.complete only ever\n    // advances the unlock pointer forward).\n    function openMissionSelect() {\n      screen = 'select';\n      var prog = C.progress();\n      var missions = C.missions();\n      var rows = '';\n      for (var i = 0; i < missions.length; i++) {\n        var mm = missions[i];\n        var unlocked = i <= prog.current;\n        var cleared = i < prog.completed;\n        var cls = 'camp-mission' + (!unlocked ? ' locked' : '') + ((unlocked && !cleared) ? ' current' : '');\n        var tag = cleared ? '<span class=\"camp-m-tag cleared\">cleared<\u002Fspan>'\n                : unlocked ? '<span class=\"camp-m-tag next\">continue<\u002Fspan>'\n                : '<span class=\"camp-m-tag locked\">locked<\u002Fspan>';\n        rows += '<div class=\"' + cls + '\"' + (unlocked ? ' data-m=\"' + i + '\"' : '') + '>' +\n          '<div class=\"camp-m-no\">' + (i + 1) + '<\u002Fdiv>' +\n          '<div class=\"camp-m-body\"><div class=\"camp-m-name\">' + esc(mm.name) + '<\u002Fdiv>' +\n          '<div class=\"camp-m-teach\">' + esc(mm.teaches) + '<\u002Fdiv><\u002Fdiv>' +\n          tag + '<\u002Fdiv>';\n      }\n      cardEl.className = 'camp-card';\n      cardEl.innerHTML =\n        '<div class=\"camp-eyebrow\">Campaign<\u002Fdiv>' +\n        '<div class=\"camp-title\">Select a mission<\u002Fdiv>' +\n        '<div class=\"camp-place\">Replay any terrace you\\u2019ve reached.<\u002Fdiv>' +\n        '<div class=\"camp-missions\">' + rows + '<\u002Fdiv>' +\n        '<div class=\"camp-foot\">' + menuBtn() + '<div class=\"spacer\"><\u002Fdiv><\u002Fdiv>';\n      cardEl.scrollTop = 0;\n      var els = cardEl.querySelectorAll('[data-m]');\n      for (var k = 0; k < els.length; k++) els[k].onclick = function () {\n        cur = parseInt(this.getAttribute('data-m'), 10);\n        mode = 'continue';\n        picks = clone(C.progress().loadouts);\n        openBriefing();\n      };\n      cardEl.querySelector('[data-title]').onclick = toTitle;\n      show();\n    }\n\n    function toTitle() {\n      hide();\n      window.__missionLive = false;\n      if (window.__showTitle) window.__showTitle();\n    }\n\n    // ── public bridge ────────────────────────────────────────────\n    window.__hkCampaign = {\n      begin: function (m) {\n        mode = m || 'continue';\n        var prog = C.progress();\n        cur = prog.current;\n        picks = clone(prog.loadouts);\n        openBriefing();\n      },\n      restyle: function (v) { style = v; if (screen === 'briefing' && camp.classList.contains('on')) openBriefing(); },\n      openSelect: function () { openMissionSelect(); },\n      replayBriefing: function () { mode = 'continue'; var prog = C.progress(); cur = prog.current; picks = clone(prog.loadouts); openBriefing(); },\n      resetAll: function () {\n        C.reset();\n        try { localStorage.removeItem('hk_profiles_v1'); localStorage.removeItem('hk_onboarded_v1'); localStorage.removeItem('hk_knight_tour_v1'); localStorage.removeItem('hk_boost_tip_v1'); } catch (e) {}\n        toTitle();\n      }\n    };\n  })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
