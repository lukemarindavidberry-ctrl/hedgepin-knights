a(246,201,92,${Math.min(0.8, e.charge / 14)})`; ctx.lineWidth = 2.5;\n      ctx.beginPath(); ctx.arc(x, y, r + 3, 0, 7); ctx.stroke();\n    }\n    ctx.restore();\n  }\n}\n\n// ── hedgehogs ──────────────────────────────────────────────────────────────────\nfunction drawHedgehogs(G) {\n  for (const h of G.hedgehogs) {\n    const { x, y } = h.body.position; const r = h.r;\n    ctx.save();\n    // shockwave ring\n    if (h.shockwaveAnim > 0) {\n      const t = 1 - h.shockwaveAnim / 0.45;\n      ctx.strokeStyle = `rgba(188,91,56,${1 - t})`; ctx.lineWidth = 4;\n      ctx.beginPath(); ctx.arc(x, y, 20 + t * 80, 0, 7); ctx.stroke();\n    }\n    if (h.pierceAnim > 0) {\n      ctx.strokeStyle = `rgba(169,130,60,${h.pierceAnim / 0.5})`; ctx.lineWidth = 3;\n      ctx.beginPath(); ctx.arc(x, y, r + 6, 0, 7); ctx.stroke();\n    }\n    const base = h.hero.color, dark = h.hero.colorD;\n    let body = h.spent ? '#9fb0ba' : base;\n    if (h.flash > 0) body = lighten(body);\n    // ball body\n    ctx.fillStyle = body;\n    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();\n    // spines (skin only) — radial stubs, batched into ONE stroked path\n    // (was 12 separate stroke() calls per knight — stroke() is the costly op)\n    if (isSkinned()) {\n      ctx.strokeStyle = h.spent ? '#7d909b' : dark; ctx.lineWidth = 2.4;\n      const spin = h.body.angle;\n      ctx.beginPath();\n      for (let i = 0; i < 12; i++) {\n        const a = spin + i / 12 * Math.PI * 2;\n        const ca = Math.cos(a), sa = Math.sin(a);\n        ctx.moveTo(x + ca * (r - 2), y + sa * (r - 2));\n        ctx.lineTo(x + ca * (r + 5), y + sa * (r + 5));\n      }\n      ctx.stroke();\n      // helmet face hint\n      ctx.fillStyle = h.spent ? '#cdd7dd' : h.hero.accent;\n      ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, 7); ctx.fill();\n    }\n    ctx.strokeStyle = h.spent ? '#7d909b' : dark; ctx.lineWidth = 2;\n    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.stroke();\n\n    // pierce-ready aura\n    if (h.pierceReady) { ctx.strokeStyle = COL.brass; ctx.lineWidth = 2; ctx.setLineDash([4, 4]); ctx.beginPath(); ctx.arc(x, y, r + 5, 0, 7); ctx.stroke(); ctx.setLineDash([]); }\n\n    // energy ring (diegetic, on the actor)\n    const frac = Math.max(0, h.energy / heroEnergyMax(h.hero));\n    ctx.strokeStyle = 'rgba(28,26,24,0.3)'; ctx.lineWidth = 3;\n    ctx.beginPath(); ctx.arc(x, y, r + 7, 0, 7); ctx.stroke();\n    ctx.strokeStyle = h.spent ? COL.red : frac < 0.3 ? COL.amber : COL.green; ctx.lineWidth = 3;\n    ctx.beginPath(); ctx.arc(x, y, r + 7, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2); ctx.stroke();\n\n    // spent wheeze marks\n    if (h.spent) {\n      ctx.font = \"600 13px 'IM Fell English', Cinzel, serif\";\n      ctx.fillStyle = '#7d909b'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';\n      ctx.fillText('z', x + r, y - r);\n    }\n    ctx.restore();\n  }\n}\n\nfunction lighten(hex) {\n  const n = parseInt(hex.slice(1), 16);\n  let r = (n >> 16) + 50, g = ((n >> 8) & 255) + 50, b = (n & 255) + 50;\n  r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);\n  return `rgb(${r},${g},${b})`;\n}\n\n// ── puffs (trickster) ────────────────────────────────────────────────────────\nfunction drawPuffs(G) {\n  for (const h of G.hedgehogs) if (h.puffs) for (const p of h.puffs) {\n    const a = p.life / p.max;\n    ctx.fillStyle = `rgba(110,114,69,${a * 0.35})`;\n    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (1.2 - a * 0.2), 0, 7); ctx.fill();\n  }\n}\n\n// ── flippers ───────────────────────────────────────────────────────────────────\nfunction drawFlippers(G) {\n  for (const f of [W.flipL, W.flipR]) {\n    const v = f.body.vertices;\n    ctx.beginPath(); ctx.moveTo(v[0].x, v[0].y);\n    for (let i = 1; i < v.length; i++) ctx.lineTo(v[i].x, v[i].y);\n    ctx.closePath();\n    const hot = f.heat / 100;\n    if (isSkinned()) {\n      ctx.fillStyle = f.heat >= 100 ? COL.red : mix(COL.adriaticS, COL.red, hot);\n      ctx.fill(); ctx.strokeStyle = COL.adriaticD; ctx.lineWidth = 2; ctx.stroke();\n    } else {\n      ctx.fillStyle = f.heat >= 100 ? '#cf4d2c' : mix('#7a8088', '#cf4d2c', hot);\n      ctx.fill(); ctx.strokeStyle = '#aab0b8'; ctx.lineWidth = 1.5; ctx.stroke();\n    }\n    // pivot\n    ctx.fillStyle = isSkinned() ? COL.brass : '#999';\n    ctx.beginPath(); ctx.arc(f.pivot.x, f.pivot.y, 6, 0, 7); ctx.fill();\n    // heat meter\n    const mx = f.pivot.x + (f.side === 'L' ? -4 : 4), my = f.pivot.y + 18;\n    ctx.fillStyle = 'rgba(28,26,24,0.5)'; rr(mx - 22, my, 44, 6, 3); ctx.fill();\n    ctx.fillStyle = f.heat >= 100 ? COL.red : hot > 0.7 ? COL.amber : COL.green;\n    rr(mx - 22, my, 44 * hot, 6, 3); ctx.fill();\n  }\n}\nfunction mix(a, b, t) {\n  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);\n  const r = Math.round(((pa >> 16) * (1 - t) + (pb >> 16) * t));\n  const g = Math.round((((pa >> 8) & 255) * (1 - t) + ((pb >> 8) & 255) * t));\n  const bl = Math.round(((pa & 255) * (1 - t) + (pb & 255) * t));\n  return `rgb(${r},${g},${bl})`;\n}\n\n// ── breach line + cost element ────────────────────────────────────────────────\nfunction drawBreachLine(G) {\n  // The dashed drain-gap line was removed — the crenellated rampart crown now\n  // carries the \"this is the line\" read on its own, so the extra dotted cue\n  // behind the paddles was redundant. (Kept as a no-op so the call site is stable.)\n  return;\n}\n\n// ── bottom controls: two paddle pads (deck) · launch button (on canvas) ──────\nfunction drawPlunger(G) {\n  const charging = G.plunger.charging, pw = G.plunger.power;\n\n  // ── two big paddle pads filling the deck directly below the field ──────────\n  // These are the reclaimed space — the explicit L / R flipper inputs.\n  const padTop = CTRL.PADDLE_TOP, padBot = CTRL.PADDLE_BOTTOM, padH = padBot - padTop;\n  const midX = VIEW.W / 2, gutter = 9;\n  ctx.save();\n  for (const spec of [\n        { f: W.flipL, x0: PF.LEFT, x1: midX - gutter, dir: -1, lab: 'LEFT FLIPPER' },\n        { f: W.flipR, x0: midX + gutter, x1: PF.RIGHT, dir: 1, lab: 'RIGHT FLIPPER' }]) {\n    const { f, x0, x1, dir, lab } = spec;\n    const w = x1 - x0, cx = x0 + w / 2;\n    const held = !!(f && f.active), over = !!(f && (f.heat >= 100 || f.locked)), hot = f ? f.heat / 100 : 0;\n    // pad face\n    if (isSkinned()) {\n      ctx.fillStyle = over ? 'rgba(207,77,44,0.16)' : held ? 'rgba(62,142,168,0.22)' : 'rgba(20,80,107,0.06)';\n    } else {\n      ctx.fillStyle = over ? 'rgba(207,77,44,0.18)' : held ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.035)';\n    }\n    rr(x0, padTop, w, padH, 14); ctx.fill();\n    ctx.strokeStyle = over ? COL.red : held ? (isSkinned() ? COL.adriaticS : '#d6dde4') : (isSkinned() ? 'rgba(20,80,107,0.30)' : 'rgba(255,255,255,0.16)');\n    ctx.lineWidth = held ? 3 : 1.5; ctx.setLineDash(held ? [] : [9, 7]);\n    rr(x0, padTop, w, padH, 14); ctx.stroke();\n    ctx.setLineDash([]);\n    // on-brand stroked chevron (carved-mark style, not a platform emoji glyph)\n    const glyphC = over ? COL.red : held ? (isSkinned() ? COL.adriaticD : COL.paper) : (isSkinned() ? 'rgba(20,80,107,0.55)' : '#8b9199');\n    const gy = padTop + padH / 2 - 16, gsz = 30;\n    // double mark — outer pip is lighter, reads as a flipper sweep direction\n    chevron(cx + dir * 22, gy, gsz, dir, glyphC, 7);\n    ctx.globalAlpha = 0.45;\n    chevron(cx - dir * 14, gy, gsz, dir, glyphC, 7);\n    ctx.globalAlpha = 1;\n    // label\n    txt(lab, cx, padTop + padH - 40, 13, isSkinned() ? COL.adriaticD : '#9aa0a8', FONT_UI, 'center', '700', 1.6);\n    // heat meter\n    const hmw = Math.min(180, w - 60), hmx = cx - hmw / 2, hmy = padTop + padH - 26;\n    ctx.fillStyle = isSkinned() ? 'rgba(28,26,24,0.14)' : 'rgba(0,0,0,0.4)'; rr(hmx, hmy, hmw, 7, 3.5); ctx.fill();\n    ctx.fillStyle = over ? COL.red : hot > 0.7 ? COL.amber : COL.green;\n    rr(hmx, hmy, hmw * hot, 7, 3.5); ctx.fill();\n    if (over) txt('OVERHEATED', cx, hmy - 8, 9.5, COL.red, FONT_UI, 'center', '800', 1.5);\n  }\n  ctx.restore();\n\n  // ── launch button — ON THE CANVAS, in the sealed dead-space right of the paddles ──\n  const L = CTRL.LAUNCH;\n  ctx.save();\n  // soft seat halo so it reads as a planted control, not a loose ball\n  ctx.fillStyle = isSkinned() ? 'rgba(44,38,32,0.10)' : 'rgba(0,0,0,0.28)';\n  ctx.beginPath(); ctx.arc(L.x, L.y + 3, L.r + 5, 0, 7); ctx.fill();\n  // base disc\n  ctx.fillStyle = isSkinned() ? (charging ? COL.terracottaD : COL.terracotta) : (charging ? '#8d3f23' : '#5a4038');\n  ctx.beginPath(); ctx.arc(L.x, L.y, L.r, 0, 7); ctx.fill();\n  ctx.strokeStyle = isSkinned() ? COL.brass : '#888'; ctx.lineWidth = 3;\n  ctx.beginPath(); ctx.arc(L.x, L.y, L.r, 0, 7); ctx.stroke();\n  // charge ring (fills clockwise)\n  ctx.strokeStyle = COL.amber; ctx.lineWidth = 6;\n  ctx.beginPath(); ctx.arc(L.x, L.y, L.r - 7, -Math.PI / 2, -Math.PI / 2 + pw * Math.PI * 2); ctx.stroke();\n  // queue-head portrait inside\n  const head = G.queue[0];\n  if (head != null) {\n    const hero = HEROES[head];\n    ctx.fillStyle = hero.color; ctx.beginPath(); ctx.arc(L.x, L.y - 6, 21, 0, 7); ctx.fill();\n    ctx.strokeStyle = hero.colorD; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(L.x, L.y - 6, 21, 0, 7); ctx.stroke();\n  }\n  txt(charging ? 'RELEASE' : 'LAUNCH', L.x, L.y + 32, 12, COL.paper, FONT_DISP, 'center', '700', 1.2);\n  // next-in-queue lamp row, tucked ABOVE the button (still inside the dead-space)\n  const qy = L.y - L.r - 14;\n  const upcoming = G.queue.slice(1, 4);\n  const qx0 = L.x - (upcoming.length - 1) * 14;\n  upcoming.forEach((id, i) => {\n    const hero = HEROES[id];\n    ctx.globalAlpha = 0.7; ctx.fillStyle = hero.color;\n    ctx.beginPath(); ctx.arc(qx0 + i * 28, qy, 10, 0, 7); ctx.fill();\n    ctx.strokeStyle = hero.colorD; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.arc(qx0 + i * 28, qy, 10, 0, 7); ctx.stroke();\n    ctx.globalAlpha = 1;\n  });\n  if (upcoming.length) txt('NEXT', L.x, qy - 16, 8.5, isSkinned() ? COL.ink3 : '#888', FONT_UI, 'center', '700', 1.6);\n  ctx.restore();\n\n  // emergence port at top-right of the field (where knights pop in)\n  const ex = PF.RIGHT - 64, ey = PF.TOP + 34;\n  ctx.save();\n  ctx.strokeStyle = isSkinned() ? COL.brass : '#888'; ctx.lineWidth = 2.5; ctx.setLineDash([4, 4]);\n  ctx.beginPath(); ctx.arc(ex, ey, 18, 0, 7); ctx.stroke(); ctx.setLineDash([]);\n  ctx.fillStyle = isSkinned() ? 'rgba(169,130,60,0.18)' : 'rgba(255,255,255,0.08)';\n  ctx.beginPath(); ctx.arc(ex, ey, 17, 0, 7); ctx.fill();\n  ctx.restore();\n}\n\n// ── top chrome: wave card (left of the chrome band) ──────────────────────────\nfunction drawHud(G) {\n  const x = 28, y = BANDS.CHROME_TOP, w = 200, h = BANDS.CHROME_H;\n  ctx.save();\n  // card\n  ctx.fillStyle = isSkinned() ? COL.limestone : 'rgba(40,44,50,0.95)';\n  rr(x, y, w, h, 10); ctx.fill();\n  ctx.strokeStyle = isSkinned() ? COL.adriaticD : '#555'; ctx.lineWidth = 1.5; rr(x, y, w, h, 10); ctx.stroke();\n\n  const w_ = Math.min(WAVES.length, Math.max(1, G.waveIndex + 1));\n  const mNo = (G.missionIndex != null ? G.missionIndex : 0) + 1;\n  txt('MISSION ' + mNo, x + 16, y + 26, 11, isSkinned() ? COL.brass : '#aab0b8', FONT_UI, 'left', '700', 1.1);\n  txt(`Wave ${w_} / ${WAVES.length}`, x + 16, y + 58, 26, isSkinned() ? COL.adriaticD : COL.paper, FONT_DISP, 'left', '600', 0.4);\n  const remain = G.spawnQueue.length + G.enemies.length;\n  txt(`${remain} REMAINING`, x + 16, y + 82, 11, isSkinned() ? COL.ink2 : '#9aa0a8', FONT_UI, 'left', '700', 1.0);\n  ctx.restore();\n}\n\n// ── hero profile cells — 3 across the top chrome band (matches Mission HUD) ───\nfunction drawHeroPanel(G) {\n  const bandY = BANDS.CHROME_TOP, bandH = BANDS.CHROME_H;\n  const x0 = 256, x1 = VIEW.W - 28;            // right of the wave card → field edge\n  const gap = 8, n = Math.max(1, Math.min(3, HERO_ORDER.length));   // 1–3 cells: only the unlocked roster\n  const cw = (x1 - x0 - gap * (n - 1)) / n;\n\n  // ordered: on-field first, then queue, then any remaining heroes in the roster\n  const onField = G.hedgehogs.map(h => h.heroId);\n  const order = [...onField, ...G.queue.filter(id => !onField.includes(id))];\n  for (const id of HERO_ORDER) if (!order.includes(id)) order.push(id);\n\n  order.slice(0, n).forEach((id, i) => {\n    const hero = HEROES[id];\n    const onF = G.hedgehogs.find(h => h.heroId === id);\n    const docked = (G._dock && G._dock[id] != null) ? G._dock[id] : heroEnergyMax(hero);\n    const energy = onF ? onF.energy : docked;\n    const cx = x0 + i * (cw + gap);\n    ctx.save();\n    // card\n    ctx.fillStyle = isSkinned() ? COL.paper : 'rgba(40,44,50,0.95)';\n    rr(cx, bandY, cw, bandH, 10); ctx.fill();\n    ctx.strokeStyle = onF ? COL.terracotta : (isSkinned() ? COL.adriaticD : '#555');\n    ctx.lineWidth = onF ? 2.5 : 1.5; rr(cx, bandY, cw, bandH, 10); ctx.stroke();\n    if (onF) { ctx.fillStyle = COL.terracotta; rr(cx, bandY, cw, 4, 10); ctx.fill(); }\n\n    // portrait roundel (left)\n    const px = cx + 38, py = bandY + bandH / 2;\n    ctx.fillStyle = hero.color; ctx.beginPath(); ctx.arc(px, py, 24, 0, 7); ctx.fill();\n    ctx.strokeStyle = hero.colorD; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(px, py, 24, 0, 7); ctx.stroke();\n    if (isSkinned()) {\n      ctx.strokeStyle = hero.colorD; ctx.lineWidth = 1.8;\n      for (let k = 0; k < 11; k++) { const a = k / 11 * 7; ctx.beginPath(); ctx.moveTo(px + Math.cos(a) * 21, py + Math.sin(a) * 21); ctx.lineTo(px + Math.cos(a) * 27, py + Math.sin(a) * 27); ctx.stroke(); }\n      ctx.fillStyle = hero.accent; ctx.beginPath(); ctx.arc(px, py, 11, 0, 7); ctx.fill();\n    }\n    // passive cooldown ring (conic, around portrait)\n    if (onF && !onF.spent) {\n      const cd = hero.passive.cd * CFG.passiveScale;\n      const f = 1 - Math.max(0, onF.passiveTimer) / cd;\n      ctx.strokeStyle = hero.accent; ctx.lineWidth = 3;\n      ctx.beginPath(); ctx.arc(px, py, 30, -Math.PI / 2, -Math.PI / 2 + f * Math.PI * 2); ctx.stroke();\n    }\n    // queue badge\n    if (!onF) {\n      const qi = G.queue.indexOf(id);\n      const bx = px + 18, by = py - 18;\n      ctx.fillStyle = COL.terracotta; ctx.beginPath(); ctx.arc(bx, by, 10, 0, 7); ctx.fill();\n      ctx.strokeStyle = COL.paper; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(bx, by, 10, 0, 7); ctx.stroke();\n      txt(qi === 0 ? '1' : String(qi + 1), bx, by + 4, 11, COL.paper, FONT_DISP, 'center', '700');\n    }\n\n    // body (right of portrait)\n    const tx = cx + 72;\n    txt(hero.name, tx, bandY + 36, 18, isSkinned() ? COL.adriaticD : COL.paper, FONT_DISP, 'left', '600', 0.3);\n    const statusTxt = onF ? (onF.spent ? 'SPENT' : 'ON FIELD')\n                          : (G.queue.indexOf(id) === 0 ? 'NEXT' : 'AT BASE');\n    txt(statusTxt, tx, bandY + 58, 10, onF && onF.spent ? COL.red : onF ? COL.green : (isSkinned() ? COL.ink2 : '#9aa0a8'), FONT_UI, 'left', '700', 0.8);\n    // energy bar (the bar IS the readout — the cramped mono number it used to\n    // carry rendered ~4px on a phone, so it's dropped in favour of a taller bar)\n    const ew = cx + cw - tx - 14, efy = bandY + 68;\n    const emax = heroEnergyMax(hero), efrac = Math.max(0, energy / emax);\n    ctx.fillStyle = isSkinned() ? 'rgba(28,26,24,0.12)' : 'rgba(0,0,0,0.4)'; rr(tx, efy, ew, 11, 5); ctx.fill();\n    ctx.fillStyle = onF && onF.spent ? COL.red : efrac < 0.3 ? COL.amber : COL.adriaticS;\n    rr(tx, efy, ew * efrac, 11, 5); ctx.fill();\n    ctx.strokeStyle = isSkinned() ? COL.adriaticD : '#555'; ctx.lineWidth = 1; rr(tx, efy, ew, 11, 5); ctx.stroke();\n    ctx.restore();\n  });\n}\n\n// ── bottom strip: health rampart (bar) + crenellation HAT ─────────────────────\n// The bar IS the health pool (stones crumble + % readout). Perched on top of it\n// is a battlement HAT — a row of merlons that crack and fall away (shedding stone\n// debris) each time an enemy breaches the line, so the wall visibly loses its\n// crown as you lose the location.\nfunction drawBottomStrip(G) {\n  const x = PF.LEFT, w = PF.RIGHT - PF.LEFT;\n  const y = BANDS.STRIP_TOP, h = BANDS.STRIP_H;\n  const skin = isSkinned();\n  const frac = G.health / HEALTH_MAX;\n  // health colour ramps through the warm terracotta family so the rampart reads\n  // as a single charged element, not a washed-out blue bar.\n  const lowC = frac > 0.5 ? '#D4592E' : frac > 0.25 ? COL.terracotta : COL.red;\n\n  ctx.save();\n  // recessed well (the gap the wall sits in)\n  ctx.fillStyle = skin ? COL.limestoneD : '#23262b';\n  rr(x, y, w, h, 6); ctx.fill();\n\n  // surviving stones — one row of merlons that crumble as the line is breached\n  const pad = 8, cols = 26;\n  const cw = (w - pad * 2) / cols;\n  const remaining = Math.ceil(cols * frac);\n  ctx.save();\n  rr(x, y, w, h, 6); ctx.clip();\n  for (let c = 0; c < cols; c++) {\n    const bx = x + pad + c * cw;\n    if (c < remaining) {\n      // present stone — top course tinted by health, base course brass/grey\n      ctx.fillStyle = skin ? (c < remaining - 1 ? COL.limestone : COL.limestoneL) : '#6f757d';\n      rr(bx + 1.5, y + 6, cw - 3, h - 12, 2.5); ctx.fill();\n      ctx.fillStyle = skin ? 'rgba(169,130,60,0.55)' : 'rgba(0,0,0,0.18)';\n      ctx.fillRect(bx + 1.5, y + h - 16, cw - 3, 4);\n    } else {\n      ctx.fillStyle = skin ? 'rgba(44,38,32,0.12)' : 'rgba(255,255,255,0.05)';\n      rr(bx + 1.5, y + 6, cw - 3, h - 12, 2.5); ctx.fill();\n    }\n  }\n  // health tint wash over the standing portion so HP reads at a glance.\n  const washW = w * frac;\n  const wash = ctx.createLinearGradient(x, 0, x + washW, 0);\n  wash.addColorStop(0, lowC); wash.addColorStop(0.82, lowC);\n  wash.addColorStop(1, frac > 0.25 ? COL.terracottaS : lowC);\n  ctx.globalAlpha = 0.42;\n  ctx.fillStyle = wash;\n  ctx.fillRect(x, y, washW, h);\n  ctx.globalAlpha = 1;\n  ctx.restore();\n\n  // frame — bold outer border (picks up the health colour) + soft drop shadow,\n  // backed by a fine brass/dark inner hairline for the carved-edge detail.\n  ctx.save();\n  ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 3;\n  ctx.strokeStyle = frac > 0.25 ? lowC : COL.red; ctx.lineWidth = 3;\n  rr(x + 1, y + 1, w - 2, h - 2, 6); ctx.stroke();\n  ctx.restore();\n  // inner hairline\n  ctx.strokeStyle = skin ? COL.brass : 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1.5;\n  rr(x + 4, y + 4, w - 8, h - 8, 4); ctx.stroke();\n  const inkOn = skin ? COL.ink : COL.paper;\n  txt('THE LINE HELD', x + 18, y + h / 2 + 6, 16, inkOn, FONT_UI, 'left', '700', 1.4);\n  txt(Math.round(frac * 100) + ' %', x + w - 18, y + h / 2 + 6, 18,\n      frac > 0.25 ? inkOn : COL.red, FONT_MONO, 'right', '700');\n\n  // ── crenellation HAT — a bold battlement crown perched on the top edge of the\n  //    bar. Chunky stone merlons that visibly CRUMBLE away (shedding angular stone\n  //    shards) as the line is breached. Standing count tracks health.\n  const hatPad = 6;\n  const hix = x + hatPad, hiw = w - hatPad * 2;\n  const nT = 9;                           // fewer, chunkier merlons → reads stronger\n  const unitT = hiw / (nT * 2 - 1);       // merlon width == crenel (gap) width\n  const merlonH = 18;                     // taller crown → more pop above the bar\n  const crownY = y;                       // teeth sit on the bar's top edge\n  const standT = Math.round(nT * frac);\n\n  // crumble hook: when the standing count drops (an enemy got through), throw a\n  // burst of angular stone shards from each merlon that just toppled.\n  if (G._crenN == null) G._crenN = standT;\n  if (standT < G._crenN && typeof addDebris === 'function') {\n    for (let m = standT; m < G._crenN; m++) {\n      const dx = hix + m * 2 * unitT + unitT / 2;\n      addDebris(dx, crownY - merlonH * 0.5, skin ? COL.limestoneL : '#aab0b8', 7);\n      addDebris(dx, crownY - merlonH * 0.5, skin ? COL.limestoneD : '#5a606a', 5);\n    }\n  }\n  G._crenN = standT;\n\n  const stoneLit = skin ? COL.limestoneL : '#aab0b8';   // bright sunlit crown / left face\n  const stoneMid = skin ? COL.limestoneD : '#7c828a';   // body — DARKER than the deck so it reads\n  const stoneSha = skin ? '#A8946F'      : '#565c66';   // shadowed right face\n  const seam     = skin ? 'rgba(44,38,32,0.34)' : 'rgba(0,0,0,0.45)';\n  const outline  = skin ? COL.ink : 'rgba(0,0,0,0.6)';\n  const seat     = 4;                                    // merlons sink into the bar's top course\n\n  for (let m = 0; m < nT; m++) {\n    const mx = hix + m * 2 * unitT;\n    const top = crownY - merlonH;\n    const base = crownY + seat;                          // overlap the bar → grounded, not floating\n    if (m < standT) {\n      const crumbling = (m === standT - 1 && frac < 1);   // leading tooth, next to fall\n      ctx.save();\n      if (crumbling) {\n        // broken silhouette — the top-right corner has crumbled off\n        ctx.beginPath();\n        ctx.moveTo(mx, top + 4);\n        ctx.lineTo(mx + unitT * 0.42, top + 4);\n        ctx.lineTo(mx + unitT * 0.52, top + merlonH * 0.34);\n        ctx.lineTo(mx + unitT * 0.80, top + merlonH * 0.30);\n        ctx.lineTo(mx + unitT, top + merlonH * 0.5);\n        ctx.lineTo(mx + unitT, base);\n        ctx.lineTo(mx, base);\n        ctx.closePath();\n        ctx.clip();\n      }\n      // body\n      ctx.fillStyle = stoneMid; ctx.fillRect(mx, top, unitT, base - top);\n      // sunlit crown course + left light face\n      ctx.fillStyle = stoneLit;\n      ctx.fillRect(mx, top, unitT, 4);\n      ctx.fillRect(mx, top, 3, base - top);\n      // shaded right face + base seam (carved-block depth)\n      ctx.fillStyle = stoneSha;\n      ctx.fillRect(mx + unitT - 4, top + 4, 4, base - top - 4);\n      // a couple of mortar/crack flecks for stone texture\n      ctx.fillStyle = seam;\n      ctx.fillRect(mx + unitT * 0.5, top + 5, 1.5, merlonH - 8);\n      ctx.restore();\n      // crisp outline so the crown pops off the limestone deck behind it\n      ctx.strokeStyle = outline; ctx.lineWidth = 1.5;\n      ctx.strokeRect(mx + 0.75, top + 0.75, unitT - 1.5, base - top - 0.75);\n      if (crumbling) {\n        // hairline fracture creeping down the standing remainder\n        ctx.strokeStyle = seam; ctx.lineWidth = 1.25;\n        ctx.beginPath();\n        ctx.moveTo(mx + unitT * 0.28, top + 2);\n        ctx.lineTo(mx + unitT * 0.40, top + merlonH * 0.55);\n        ctx.lineTo(mx + unitT * 0.22, base - 3);\n        ctx.stroke();\n      }\n    } else {\n      // fallen merlon — a low, broken stub of rubble left on the crown\n      ctx.fillStyle = skin ? 'rgba(120,100,70,0.32)' : 'rgba(255,255,255,0.10)';\n      ctx.beginPath();\n      ctx.moveTo(mx, crownY);\n      ctx.lineTo(mx + unitT * 0.16, crownY - 5);\n      ctx.lineTo(mx + unitT * 0.40, crownY - 7);\n      ctx.lineTo(mx + unitT * 0.60, crownY - 3.5);\n      ctx.lineTo(mx + unitT * 0.82, crownY - 6);\n      ctx.lineTo(mx + unitT, crownY - 3);\n      ctx.lineTo(mx + unitT, crownY);\n      ctx.closePath(); ctx.fill();\n    }\n  }\n\n  ctx.restore();\n}\n\n// ── particles / callouts / aim ─────────────────────────────────────────────────\nfunction drawParticles(G) {\n  for (const p of G.particles) {\n    ctx.globalAlpha = Math.max(0, p.life / p.max);\n    ctx.fillStyle = p.color;\n    if (p.shard) {\n      // angular stone chip — a small rotating rectangle (reads as crumbling masonry)\n      ctx.save();\n      ctx.translate(p.x, p.y);\n      ctx.rotate(p.rot || 0);\n      ctx.fillRect(-p.r, -p.r * 0.66, p.r * 2, p.r * 1.32);\n      ctx.restore();\n    } else {\n      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();\n    }\n  }\n  ctx.globalAlpha = 1;\n}\nfunction drawCallouts(G) {\n  for (const c of G.callouts) {\n    ctx.globalAlpha = Math.min(1, c.life / 0.3);\n    txt(c.text, c.x, c.y, c.size, c.color, FONT_UI, 'center', '800', 0.5);\n  }\n  ctx.globalAlpha = 1;\n}\nfunction drawAim(G) {\n  if (!G.aim.active || !G.aim.hh) return;\n  const h = G.aim.hh; const hx = h.body.position.x, hy = h.body.position.y;\n  // SLINGSHOT: pull vector = origin → current pointer; travel = the OPPOSITE\n  let dx = G.aim.px - G.aim.ox, dy = G.aim.py - G.aim.oy; const d = Math.hypot(dx, dy);\n  // ring on the grabbed knight so it's clear which one will fly\n  ctx.strokeStyle = h.hero.accent; ctx.lineWidth = 2.5; ctx.setLineDash([5, 5]);\n  ctx.beginPath(); ctx.arc(hx, hy, h.r + 8, 0, 7); ctx.stroke(); ctx.setLineDash([]);\n  if (d < 2) return;\n  // pull unit (drag dir) and travel unit (opposite)\n  const pux = dx / d, puy = dy / d;        // pull direction (where the finger went)\n  const ux = -pux, uy = -puy;              // travel direction (where it will fly)\n  const mag = Math.min(d, 220) / 220;\n  const cost = CFG.boostCost * h.hero.boostCostMul;\n  const ok = h.energy >= cost;\n  const col = ok ? h.hero.color : COL.red;\n\n  // 1) tension band BEHIND the knight — stretched back toward the pull, scales with power\n  const backLen = mag * 90;\n  ctx.strokeStyle = ok ? 'rgba(255,255,255,0.5)' : 'rgba(207,77,44,0.55)';\n  ctx.lineWidth = 2 + mag * 2; ctx.setLineDash([5, 5]);\n  ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx + pux * backLen, hy + puy * backLen); ctx.stroke();\n  ctx.setLineDash([]);\n  // little nock dot at the draw point\n  ctx.fillStyle = ctx.strokeStyle;\n  ctx.beginPath(); ctx.arc(hx + pux * backLen, hy + puy * backLen, 3 + mag * 2, 0, 7); ctx.fill();\n\n  // 2) forward TRAJECTORY indicator IN FRONT — dashed predicted path + arrowhead,\n  //    pointing where the knight will actually launch\n  const fwdLen = 60 + mag * 150;\n  ctx.strokeStyle = col; ctx.lineWidth = 3.5; ctx.setLineDash([10, 8]); ctx.globalAlpha = 0.9;\n  ctx.beginPath(); ctx.moveTo(hx + ux * (h.r + 6), hy + uy * (h.r + 6)); ctx.lineTo(hx + ux * fwdLen, hy + uy * fwdLen); ctx.stroke();\n  ctx.setLineDash([]); ctx.globalAlpha = 1;\n  const ax = hx + ux * fwdLen, ay = hy + uy * fwdLen;\n  ctx.fillStyle = col;\n  ctx.beginPath();\n  ctx.moveTo(ax + ux * 14, ay + uy * 14);\n  ctx.lineTo(ax - uy * 9, ay + ux * 9);\n  ctx.lineTo(ax + uy * 9, ay - ux * 9);\n  ctx.fill();\n  // power %\n  txt(ok ? Math.round(mag * 100) + '%' : 'NO ENERGY', hx, hy - h.r - 14, 12, col, FONT_UI, 'center', '800');\n}\n\n// ── overlays (ready / win / lose + slow-mo vignette) ──────────────────────────\nlet _slowmoGrad = null;\nfunction drawOverlays(G) {\n  if (G.aim.active && CFG.slowmoAim) {\n    // gradient is geometry-constant (centre + radius never change) — build once\n    // and reuse, instead of allocating a full-canvas radial gradient every frame\n    // during aim, which is exactly when we can least afford the extra work.\n    if (!_slowmoGrad) {\n      _slowmoGrad = ctx.createRadialGradient(VIEW.W / 2, VIEW.H / 2, 200, VIEW.W / 2, VIEW.H / 2, 700);\n      _slowmoGrad.addColorStop(0, 'rgba(20,80,107,0)'); _slowmoGrad.addColorStop(1, 'rgba(20,80,107,0.28)');\n    }\n    ctx.fillStyle = _slowmoGrad; ctx.fillRect(0, 0, VIEW.W, VIEW.H);\n  }\n  // launch hold — the world is frozen the instant a knight is flung, giving the\n  // player a beat to move their thumbs onto the paddles. A faint wash + a pulsing\n  // prompt; released by the next flipper tap or boost grab.\n  if (G._launchHold) {\n    ctx.fillStyle = 'rgba(20,24,28,0.20)'; ctx.fillRect(0, 0, VIEW.W, VIEW.H);\n    const touch = typeof matchMedia === 'function' && matchMedia('(pointer: coarse)').matches;\n    const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 360);\n    const sub = touch ? 'Tap a paddle — or boost a knight — to release'\n                      : 'Press a flipper — or boost a knight — to release';\n    // Solid limestone plaque behind both lines so the prompt reads over any\n    // busy playfield — measure the wider line and pad generously.\n    const subSize = fit(20), padX = fit(28), padY = fit(20);\n    ctx.font = `600 ${subSize}px ${FONT_UI}`;\n    let subW = 0; for (const ch of sub) subW += ctx.measureText(ch).width + 0.5;\n    const panelW = Math.max(subW, fit(280)) + padX * 2;\n    const panelH = fit(96);\n    const px = VIEW.W / 2 - panelW / 2, py = VIEW.H / 2 - panelH / 2;\n    ctx.save();\n    ctx.fillStyle = 'rgba(18,22,26,0.86)';\n    ctx.strokeStyle = COL.amber; ctx.lineWidth = fit(2);\n    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(px, py, panelW, panelH, fit(10)); ctx.fill(); ctx.stroke(); }\n    else { ctx.fillRect(px, py, panelW, panelH); ctx.strokeRect(px, py, panelW, panelH); }\n    ctx.restore();\n    ctx.save(); ctx.globalAlpha = pulse;\n    txt('KNIGHT IN FLIGHT', VIEW.W / 2, VIEW.H / 2 - fit(8), 26, COL.amber, FONT_DISP, 'center', '600', 1);\n    ctx.restore();\n    txt(sub, VIEW.W / 2, VIEW.H / 2 + fit(26), 20, '#F3E9D2', FONT_UI, 'center', '600', 0.5);\n  }\n  if (G.state === 'wavebreak' && G.breakTimer > 0 && !G._launchHold) {\n    txt('WAVE ' + (G.waveIndex + 2 <= WAVES.length ? G.waveIndex + 2 : WAVES.length) + ' INCOMING', VIEW.W / 2, VIEW.H / 2 - 14, 30, COL.amber, FONT_DISP, 'center', '600', 1);\n    txt('· ' + Math.ceil(G.breakTimer) + ' ·  tap LAUNCH to send your knights', VIEW.W / 2, VIEW.H / 2 + 16, 14, isSkinned() ? COL.adriaticD : '#ccc', FONT_UI, 'center', '500', 0.5);\n  }\n  if ((G.state === 'won' || G.state === 'lost') && !window.__campaignUI) {\n    // Fallback canvas end-card. When the DOM campaign layer is installed it owns\n    // the win/next + retry flow (and records progress), so this is suppressed.\n    ctx.fillStyle = 'rgba(20,24,28,0.74)'; ctx.fillRect(0, 0, VIEW.W, VIEW.H);\n    const win = G.state === 'won';\n    txt(win ? 'THE LINE HELD' : 'THE LOCATION FELL', VIEW.W / 2, VIEW.H / 2 - 36, 46, win ? COL.amber : COL.red, FONT_DISP, 'center', '700', 2);\n    txt(win ? 'Every wave repelled. Then we hold the terraces.' : 'Too many breached. Retry — try chaining them at the gap.',\n      VIEW.W / 2, VIEW.H / 2 + 4, 16, COL.paper, FONT_UI, 'center', '500');\n    txt(`kills ${G.stats.kills}   ·   chains ${G.stats.chains}   ·   breaches ${G.stats.breaches}`,\n      VIEW.W / 2, VIEW.H / 2 + 36, 13, isSkinned() ? COL.brassL : '#aab0b8', FONT_MONO, 'center', '500');\n    txt('tap or press R to play again', VIEW.W / 2, VIEW.H / 2 + 74, 13, COL.paper, FONT_UI, 'center', '700', 1);\n  }\n}\n\n\n/* ===== game.js ===== */\n/* ============================================================\n   Hedgepin Knights — Prototype  ·  game.js\n   Game state, loop, spawning/waves, collisions+chains, energy,\n   boost-aim, flipper input/heat, signature passives, loss state.\n   Depends on config.js, world.js, render.js.\n   ============================================================ */\n\n// AABB-with-radius test: does a body of radius r at (px,py) overlap rect sf {x,y,w,h}?\nfunction inSlowRect(px, py, r, sf) {\n  return px + r > sf.x && px - r < sf.x + sf.w &&\n         py + r > sf.y && py - r < sf.y + sf.h;\n}\n\n// Fast vector length. Math.hypot is overflow-safe but markedly slower (~3-5×) in\n// V8/JSC; our magnitudes are small and bounded by the speed clamps, so the plain\n// form is correct and is called thousands of times per frame in the hot loops.\n// Where we only need a threshold compare we skip this entirely and compare the\n// SQUARED magnitude against the squared threshold — no sqrt at all.\nfunction vlen(x, y) { return Math.sqrt(x * x + y * y); }\n\nconst G = {\n  state: 'ready',          // ready | playing | wavebreak | won | lost\n  hedgehogs: [],\n  enemies: [],\n  queue: [],               // hero ids waiting at base/plunger\n  waveIndex: -1,\n  spawnQueue: [],          // enemy types still to spawn this wave\n  spawnTimer: 0,\n  breakTimer: 0,\n  health: HEALTH_MAX,\n  callouts: [],            // {x,y,text,life,max,color,size}\n  particles: [],           // {x,y,vx,vy,life,max,r,color}\n  shake: 0,\n  plunger: { charging: false, power: 0 },\n  aim: { active: false, hh: null, px: 0, py: 0 },\n  flip: { L: false, R: false },\n  stats: { kills: 0, chains: 0, breaches: 0 },\n  time: 0,\n  lastSpawnSide: 1,\n};\n\n// ── lifecycle ────────────────────────────────────────────────────────────\nfunction resetGame() {\n  // clear bodies\n  for (const h of G.hedgehogs) if (h.body) Composite.remove(W.world, h.body);\n  for (const e of G.enemies) if (e.body) Composite.remove(W.world, e.body);\n  G.hedgehogs = []; G.enemies = []; G.callouts = []; G.particles = [];\n  G.queue = HERO_ORDER.slice();\n  G.waveIndex = -1; G.spawnQueue = []; G.spawnTimer = 0;\n  G.health = HEALTH_MAX; G.shake = 0; G.time = 0;\n  G.stats = { kills: 0, chains: 0, breaches: 0 };\n  G._ended = false;            // one-shot guard for the win/lose hook (see update)\n  G.plunger = { charging: false, power: 0 };\n  G.aim = { active: false, hh: null, ox: 0, oy: 0, px: 0, py: 0 };\n  W.flipL.heat = 0; W.flipR.heat = 0; W.flipL.active = false; W.flipR.active = false;\n  W.flipL.locked = false; W.flipR.locked = false;\n  G._launchHold = false;          // clear any held-on-launch freeze\n  G._holdArm = null;              // clear any pending (deferred) freeze\n  startWaveBreak(3.2);\n}\n\n// Release the post-launch freeze, if one is up. Called by the first gameplay\n// input after a launch — a flipper tap/key or a boost-aim grab.\nfunction releaseLaunchHold() {\n  G._holdArm = null;               // cancel a still-pending deferred freeze too\n  if (G._launchHold) { G._launchHold = false; _last = 0; }\n}\n\nfunction startWaveBreak(t) {\n  G.state = 'wavebreak';\n  G.breakTimer = t;\n}\n\nfunction beginNextWave() {\n  G.waveIndex++;\n  if (G.waveIndex >= WAVES.length) { G.state = 'won'; return; }\n  // build interleaved spawn queue, scaled by waveSize\n  const groups = WAVES[G.waveIndex];\n  const list = [];\n  for (const g of groups) {\n    const n = Math.max(1, Math.round(g.n * CFG.waveSize));\n    for (let i = 0; i < n; i++) list.push(g.type);\n  }\n  // shuffle for variety\n  for (let i = list.length - 1; i > 0; i--) {\n    const j = Math.floor(Math.random() * (i + 1));\n    [list[i], list[j]] = [list[j], list[i]];\n  }\n  G.spawnQueue = list;\n  G.spawnTimer = 0.4;\n  G.state = 'playing';\n}\n\n// ── spawning ──────────────────────────────────────────────────────────────\nfunction spawnEnemy(type) {\n  const def = ENEMIES[type];\n  const r = def.radius * CFG.entityScale;\n  const x = PF.VENT_X + (Math.random() * 2 - 1) * 26;\n  const y = PF.VENT_Y + 18;\n  const body = Bodies.circle(x, y, r, {\n    restitution: 0.45, friction: 0.02, frictionAir: 0.012,\n    density: 0.003 * def.massMul * CFG.enemyMass,\n  });\n  gdata(body, { kind: 'enemy' });\n  // scatter out of the vent in a wide random fan rather than straight down — they\n  // wander in the upper field before the centre-pull takes over (see march loop).\n  const ang = (Math.random() * 2 - 1) * 1.15;          // ±~66° from straight down\n  const spd = 1.6 + Math.random() * 1.4;\n  Body.setVelocity(body, { x: Math.sin(ang) * spd, y: Math.cos(ang) * spd * 0.6 + 0.4 });\n  Composite.add(W.world, body);\n  const e = {\n    body, type, def, r,\n    hp: def.hp, hpMax: def.hp,\n    status: { stun: 0, offbal: 0, slow: 0, mark: 0 },\n    charge: 0,            // residual \"was just hit\" energy for chains\n    spawn: 0.5,           // spawn-in animation\n    // slow-rotating personal heading that drives the upper-field wander (each\n    // marcher drifts its own way until it descends past CFG.scatterDepth).\n    wander: Math.random() * Math.PI * 2,\n    wanderRate: 1.3 + Math.random() * 1.8,\n    // each marcher owns a lane along the breach line instead of all homing to dead\n    // centre — picks a target x within a broad band, clamped to the field interior.\n    targetX: Math.max(PF.LEFT + 46, Math.min(PF.RIGHT - 46, PF.VENT_X + (Math.random() * 2 - 1) * CFG.breachSpread)),\n  };\n  body.gd.ref = e;        // O(1) body→wrapper lookup in collision handling\n  G.enemies.push(e);\n}\n\n// Bake the mission loadout's STAT-ability effect onto a freshly launched knight.\n// These are the cheap, real picks (the physics actives are embodied by the hero's\n// signature passive for now — stubbed-real). G.loadout is { heroId: {phys,stat} },\n// set by the campaign bridge before the mission starts.\nfunction applyLoadout(hh) {\n  hh.dmgMul = 1; hh.boostCostMul = hh.hero.boostCostMul; hh.drainMul = 1;\n  hh.loadout = (G.loadout && G.loadout[hh.heroId]) || null;\n  if (!hh.loadout) return;\n  const statRow = LOADOUT[hh.heroId] && LOADOUT[hh.heroId].stat;\n  const stat = statRow && statRow.find(s => s.id === hh.loadout.stat);\n  if (!stat) return;\n  switch (stat.eff) {\n    case 'massBuff':                       // Heavy: heavier + harder contact\n      hh.dmgMul = 1.25;\n      Body.setMass(hh.body, hh.body.mass * 1.3);\n      break;\n    case 'resist':      hh.drainMul = 0.6; hh.boostCostMul = hh.hero.boostCostMul * 0.85; break; // Heavy: cheaper boost (+ takes less energy on a hit, once that lands)\n    case 'contactSlow': hh.contactSlow = true; break;        // Trickster: touch → slow\n    case 'thrift':      hh.boostCostMul = hh.hero.boostCostMul * 0.7; break; // Trickster: cheaper boost\n    case 'dmgBoost':    hh.dmgMul = 1.3; break;              // Sniper: harder hits\n    case 'reach':       hh.wideHoming = true; break;         // Sniper: wider homing cone\n  }\n}\n\nfunction spawnLaunch(heroId, power) {\n  const hero = HEROES[heroId];\n  const r = hero.radius * CFG.entityScale;\n  // doc: plunger track is underground; the knight EMERGES at the top of the field.\n  // It enters from the right just under the vent and SHOOTS LATERALLY across the\n  // space below the grate — a flat skill-shot streak before gravity drops it into\n  // the field. Charge controls how hard/far it's flung across.\n  const ex = PF.RIGHT - 48, ey = PF.TOP + 22;\n  const body = Bodies.circle(ex, ey, r, {\n    restitution: hero.restitution, friction: hero.friction,\n    frictionAir: 0.006, density: hero.density,\n  });\n  gdata(body, { kind: 'hedgehog' });\n  // strong horizontal sweep across the top, only a slight downward bias so the\n  // knight stays in the lateral band below the vent before it arcs into play.\n  const lp = CFG.launchPower;\n  const vx = -(8 + power * 10) * lp;\n  const vy = (0.35 + power * 0.6) * lp;\n  Body.setVelocity(body, { x: vx, y: vy });\n  Composite.add(W.world, body);\n  const existing = G._dock && G._dock[heroId];\n  const energy = existing != null ? existing : heroEnergyMax(hero);\n  const hh = {\n    body, hero, heroId, r,\n    energy, spent: energy <= 0,\n    status: { slow: 0, mark: 0 },\n    passiveTimer: hero.passive.cd * CFG.passiveScale,\n    pierceReady: false,\n    riseAnim: 0.45,\n    flash: 0,\n    _fastUntil: G.time + 0.6,   // ride the higher speed cap during the lateral streak\n  };\n  body.gd.ref = hh;             // O(1) body→wrapper lookup in collision handling\n  applyLoadout(hh);             // bake the chosen abilities' stat effects onto this knight\n  G.hedgehogs.push(hh);\n  addParticles(ex, ey, COL.limestoneD, 12, 3);   // dust pop-up\n  callout(ex, ey - r - 8, HERO_LABEL(hero), hero.color, 12);\n  if (G._dock) delete G._dock[heroId];\n}\nfunction HERO_LABEL(hero) { return hero.name.toUpperCase(); }\n\nfunction heroEnergyMax(hero) { return CFG.energyMax * hero.energyMul; }\n\n// ── input ───────────────────────────────────────────────────────────────\nfunction tryLaunch(power) {\n  if (G.state !== 'playing' && G.state !== 'wavebreak') return;\n  if (G.queue.length === 0) return;\n  const id = G.queue.shift();\n  spawnLaunch(id, power);\n  // Option A — \"hold deeper in the field\". Don't freeze at the corner the instant\n  // the knight launches (it pins it against the top/right edges with no room to\n  // pull a slingshot). Instead, ARM a deferred freeze: the world keeps stepping so\n  // the knight streaks inward, then the held tableau snaps on once it's clear of\n  // the edge (x past the inset line) or a short time cap — whichever first. Any\n  // gameplay input in the meantime cancels it (see releaseLaunchHold).\n  if (CFG.launchHold) {\n    const hh = G.hedgehogs[G.hedgehogs.length - 1];\n    const inset = Math.max(0, Math.min(0.6, CFG.launchHoldInset));\n    G._holdArm = {\n      hh,\n      xTarget: PF.RIGHT - (PF.RIGHT - PF.LEFT) * inset,\n      deadline: G.time + 0.6,\n    };\n  }\n  // notify the onboarding layer (HTML shell) — it decides, once, whether to\n  // show the first-launch boost/chain/energy contextual tip.\n  if (window.__onLaunch) { try { window.__onLaunch(); } catch (_) {} }\n}\n\nfunction returnToBase(h, idx) {\n  // bank energy so it regenerates while docked, requeue at plunger\n  G._dock = G._dock || {};\n  G._dock[h.heroId] = h.energy;\n  Composite.remove(W.world, h.body);\n  G.hedgehogs.splice(idx, 1);\n  if (!G.queue.includes(h.heroId)) G.queue.push(h.heroId);\n}\n\n// ── boost aim (SLINGSHOT pull gesture, decoupled from knight position) ────────\n// A pull anywhere on the field grabs the nearest live knight and slings it in\n// the direction OPPOSITE the drag — pull back, release, it fires forward (like\n// drawing a slingshot). A bare tap (no drag) does nothing, so the field doubles\n// as a generous pull surface without misfiring.\nfunction aimStart(wx, wy) {\n  if (G.state !== 'playing' && G.state !== 'wavebreak') return;   // boost works during the wave-break pause too\n  let best = null, bd = 9999;\n  for (const h of G.hedgehogs) {\n    if (h.spent) continue;\n    const d = Math.hypot(h.body.position.x - wx, h.body.position.y - wy);\n    if (d < bd) { bd = d; best = h; }\n  }\n  if (best) {\n    G.aim.active = true; G.aim.hh = best;\n    G.aim.ox = wx; G.aim.oy = wy; G.aim.px = wx; G.aim.py = wy;\n  }\n}\nfunction aimMove(wx, wy) { if (G.aim.active) { G.aim.px = wx; G.aim.py = wy; } }\nfunction aimRelease() {\n  if (!G.aim.active || !G.aim.hh) { G.aim.active = false; return; }\n  const h = G.aim.hh;\n  const hx = h.body.position.x, hy = h.body.position.y;\n  // slingshot: travel direction is OPPOSITE the drag (release → origin)\n  let dx = G.aim.ox - G.aim.px, dy = G.aim.oy - G.aim.py;\n  let dist = Math.hypot(dx, dy);\n  const cost = CFG.boostCost * (h.boostCostMul || h.hero.boostCostMul);\n  if (dist > 24 && h.energy >= cost) {\n    dx /= dist; dy /= dist;\n    // BOOST is a crisp impulse — fully replace velocity in the aim direction so it\n    // feels snappy and is unaffected by how slow gravity/fall is tuned.\n    const mag = Math.min(dist, 220) / 220;\n    const power = (0.55 + mag * 0.7) * CFG.boostStrength * h.hero.boostMul;\n    const SPD = 30;                       // boost top speed (its own budget)\n    Body.setVelocity(h.body, { x: dx * power * SPD, y: dy * power * SPD });\n    clampSpeed(h.body, 32);               // boost gets a higher ceiling than the field\n    h._fastUntil = G.time + 0.5;          // allow the boost to ride before re-clamping\n    h.energy -= cost;\n    if (h.energy <= 0) { h.energy = 0; h.spent = true; }\n    addParticles(hx, hy, h.hero.accent, 10, 3);\n    callout(hx, hy - h.r - 8, 'BOOST', h.hero.color, 13);\n  } else if (dist > 24 && h.energy < cost) {\n    callout(hx, hy - h.r - 8, 'no energy', COL.ink3, 12);\n    h.flash = 0.3;\n  }\n  G.aim.active = false; G.aim.hh = null;\n}\n\n// ── effects helpers ────────────────────────────────────────────────────────\n// Transient FX (callouts + particles) are capped. During a chain cascade — which\n// only happens while knights are active — kills/chains/boosts spawn bursts of\n// both; left uncapped they flood the arrays and every one is drawn each frame\n// (an arc fill / a font set + fillText), which is what made the action feel less\n// fluid exactly when it got busy. Caps keep the cost bounded; oldest drop first.\nconst MAX_CALLOUTS = 22, MAX_PARTICLES = 180;\nfunction callout(x, y, text, color, size = 14) {\n  G.callouts.push({ x, y, text, color, size, life: 0.9, max: 0.9 });\n  if (G.callouts.length > MAX_CALLOUTS) G.callouts.splice(0, G.callouts.length - MAX_CALLOUTS);\n}\nfunction addParticles(x, y, color, n, spd) {\n  for (let i = 0; i < n; i++) {\n    const a = Math.random() * Math.PI * 2;\n    const s = Math.random() * spd + 0.5;\n    G.particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,\n      life: 0.5, max: 0.5, r: Math.random() * 2.5 + 1, color });\n  }\n  if (G.particles.length > MAX_PARTICLES) G.particles.splice(0, G.particles.length - MAX_PARTICLES);\n}\n\n// Chunky stone-crumble: angular shards thrown up and out, then dragged down by\n// gravity (the particle update integrates vy + spin). Reads as toppling masonry,\n// not a soft round puff. Used when a battlement merlon is lost.\nfunction addDebris(x, y, color, n) {\n  for (let i = 0; i < n; i++) {\n    const a = -Math.PI / 2 + (Math.random() - 0.5) * 1.7;   // sprayed upward-ish\n    const s = Math.random() * 3.6 + 1.4;\n    G.particles.push({\n      x: x + (Math.random() - 0.5) * 12, y: y + (Math.random() - 0.5) * 6,\n      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.0,\n      life: 0.9, max: 0.9, r: Math.random() * 2.6 + 1.6,\n      rot: Math.random() * 7, vr: (Math.random() - 0.5) * 0.6,\n      shard: true, color,\n    });\n  }\n  if (G.particles.length > MAX_PARTICLES) G.particles.splice(0, G.particles.length - MAX_PARTICLES);\n}\nfunction damageEnemy(e, dmg, fromHedge) {\n  let d = dmg;\n  if (e.status.mark > 0) d *= 1.25;\n  e.hp -= d;\n  e.flash = 0.18;\n  if (e.hp <= 0) killEnemy(e);\n}\nfunction killEnemy(e) {\n  const i = G.enemies.indexOf(e);\n  if (i < 0) return;\n  addParticles(e.body.position.x, e.body.position.y, e.def.color, 12, 3.5);\n  Composite.remove(W.world, e.body);\n  G.enemies.splice(i, 1);\n  G.stats.kills++;\n}\n\nfunction applyKnock(e, nx, ny, speed, hero) {\n  let massFactor = 1 / (e.def.massMul * CFG.enemyMass);\n  if (e.status.slow > 0) massFactor *= 1.4;\n  if (e.status.stun > 0) massFactor *= 1.5;\n  let knock = speed * 0.12 * hero.knockMul * CFG.hitImpulse * massFactor;\n  if (e.status.offbal > 0) knock *= 1.6;\n  knock = Math.min(knock, 17);\n  Body.setVelocity(e.body, {\n    x: e.body.velocity.x + nx * knock,\n    y: e.body.velocity.y + ny * knock,\n  });\n  e.charge = Math.max(e.charge, knock * 0.7);   // can now chain into others\n}\n\n// pinball-style bumper/wall response: mirror the approach off the surface normal,\n// add an outward kick, and FLOOR the exit speed so even a crawling body whizzes\n// off rather than dribbling. (n) points away from the surface, toward the body.\nfunction bumperLaunch(body, nx, ny, kick) {\n  let vx = body.velocity.x, vy = body.velocity.y;\n  const vdotn = vx * nx + vy * ny;\n  if (vdotn < 0) { vx -= 2 * vdotn * nx; vy -= 2 * vdotn * ny; }   // reflect the incoming\n  vx += nx * kick; vy += ny * kick;                                // boost outward\n  const out = vx * nx + vy * ny;                                   // guarantee a lively exit\n  const floor = kick * 1.5;\n  if (out < floor) { const add = floor - out; vx += nx * add; vy += ny * add; }\n  Body.setVelocity(body, { x: vx, y: vy });\n}\n\n// keep any body from getting fast enough to tunnel through a wall / fly off-map.\n// Compare SQUARED speed first so the common (under-cap) case never pays for sqrt.\nfunction clampSpeed(body, max) {\n  const vx = body.velocity.x, vy = body.velocity.y;\n  const sp2 = vx * vx + vy * vy;\n  if (sp2 > max * max) {\n    const sp = Math.sqrt(sp2);\n    Body.setVelocity(body, { x: vx / sp * max, y: vy / sp * max });\n  }\n}\n\n// hard safety net: keep a body inside the play rectangle no matter what. The\n// bottom is left open (the drain to base). Reflects velocity off the hard edges.\nfunction containBody(body, r) {\n  const p = body.position; let vx = body.velocity.x, vy = body.velocity.y, moved = false;\n  const L = PF.LEFT + r, R = PF.RIGHT - r, T = PF.TOP + r;\n  if (p.x < L) { Body.setPosition(body, { x: L, y: p.y }); if (vx < 0) vx = -vx * 0.4; moved = true; }\n  else if (p.x > R) { Body.setPosition(body, { x: R, y: body.position.y }); if (vx > 0) vx = -vx * 0.4; moved = true; }\n  if (body.position.y < T) { Body.setPosition(body, { x: body.position.x, y: T }); if (vy < 0) vy = -vy * 0.4; moved = true; }\n  if (moved) Body.setVelocity(body, { x: vx, y: vy });\n}\n\n// ── collisions ──────────────────────────────────────────────────────────────\nfunction onCollision(evt) {\n  for (const pair of evt.pairs) {\n    const a = pair.bodyA, b = pair.bodyB;\n    const ga = a.gd, gb = b.gd;\n    if (!ga || !gb) continue;\n    classifyHit(a, ga, b, gb, pair);\n    classifyHit(b, gb, a, ga, pair);\n  }\n}\n\nfunction classifyHit(a, ga, b, gb, pair) {\n  // hedgehog -> enemy\n  if (ga.kind === 'hedgehog' && gb.kind === 'enemy') {\n    const h = hhOf(a), e = enOf(b);\n    if (!h || !e) return;\n    const rel = Math.hypot(a.velocity.x - b.velocity.x, a.velocity.y - b.velocity.y);\n    const speed = Math.max(rel, Math.hypot(a.velocity.x, a.velocity.y));\n    let dmg = h.spent ? 3 : h.hero.contact * (0.4 + Math.min(speed, 26) / 18);\n    if (h.dmgMul) dmg *= h.dmgMul;            // loadout: Mass Buff / Damage Boost\n    // normal from hedge to enemy\n    let nx = b.position.x - a.position.x, ny = b.position.y - a.position.y;\n    const nl = Math.hypot(nx, ny) || 1; nx /= nl; ny /= nl;\n    if (!h.spent) {\n      damageEnemy(e, dmg, h);\n      applyKnock(e, nx, ny, speed + 8, h.hero);\n      // Knight-struck enemy becomes a CHAIN PROJECTILE. applyKnock alone barely\n      // moves a heavy body (knock ≈ speed·0.12·knockMul·massFactor ≈ 3), so the\n      // struck enemy never built enough relative speed to chain-kill the next one.\n      // Floor its velocity ALONG the hit normal to a real projectile speed that\n      // scales with how hard it was hit — now it genuinely careens into whatever\n      // is behind it and the chain (rel + charge gates downstream) actually fires.\n      if (CFG.chainKnock > 0) {\n        const proj = Math.min(8 + Math.min(speed, 26) * 0.5, 21) * CFG.chainKnock;\n        const cv = e.body.velocity;\n        const along = cv.x * nx + cv.y * ny;          // current speed in the knock dir\n        if (along < proj) {\n          Body.setVelocity(e.body, { x: cv.x + nx * (proj - along), y: cv.y + ny * (proj - along) });\n        }\n        e._fastUntil = G.time + 0.7;                  // let it exceed the slow field cap briefly\n        // prime charge well past the chain gate, scaled by hit strength\n        e.charge = Math.max(e.charge, 7 + Math.min(speed, 26) * 0.18);\n      }\n      if (h.contactSlow) e.status.slow = Math.max(e.status.slow, 1.6);   // loadout: Contact Slow\n      // mark it \"knight-struck\" — for the next ~window it will whizz off any\n      // bumper or wall it hits (the trial), the way a knight does.\n      e._chargedUntil = G.time + CFG.enemyWhizzWindow;\n      // sniper pierce + mark\n      if (h.pierceReady) {\n        e.status.mark = 2.0;\n        callout(e.body.position.x, e.body.position.y - e.r - 6, 'MARK', COL.brass, 12);\n        h.pierceReady = false;\n      }\n      // heavy stumble already from shockwave; light hits can stumble cats less\n      if (h.heroId === 'heavy' && speed > 9) e.status.offbal = Math.max(e.status.offbal, 1.4);\n      h.flash = 0.18;\n    } else {\n      damageEnemy(e, 3, h);\n    }\n  }\n  // enemy -> enemy : the chain\n  else if (ga.kind === 'enemy' && gb.kind === 'enemy') {\n    const e1 = enOf(a), e2 = enOf(b);\n    if (!e1 || !e2) return;\n    const rel = Math.hypot(a.velocity.x - b.velocity.x, a.velocity.y - b.velocity.y);\n    const carrier = e1.charge > e2.charge ? e1 : e2;\n    const target = carrier === e1 ? e2 : e1;\n    if (carrier.charge > 2 && rel > 4.0) {\n      const dmg = rel * 1.5 * CFG.chainMult * (1 + carrier.charge * 0.04);\n      damageEnemy(target, dmg, null);\n      // pass momentum/status along\n      let nx = target.body.position.x - carrier.body.position.x;\n      let ny = target.body.position.y - carrier.body.position.y;\n      const nl = Math.hypot(nx, ny) || 1; nx /= nl; ny /= nl;\n      Body.setVelocity(target.body, {\n        x: target.body.velocity.x + nx * Math.min(rel * 0.5, 14),\n        y: target.body.velocity.y + ny * Math.min(rel * 0.5, 14),\n      });\n      target.status.offbal = Math.max(target.status.offbal, 1.2);\n      target.charge = Math.max(target.charge, carrier.charge * 0.6);\n      carrier.charge *= 0.4;\n      G.stats.chains++;\n      const mx = (a.position.x + b.position.x) / 2, my = (a.position.y + b.position.y) / 2;\n      callout(mx, my, 'CHAIN', COL.amber, 15);\n      addParticles(mx, my, COL.amber, 8, 2.5);\n    }\n  }\n  // bumper kick\n  else if (ga.kind === 'bumper' && (gb.kind === 'hedgehog' || gb.kind === 'enemy')) {\n    let nx = b.position.x - a.position.x, ny = b.position.y - a.position.y;\n    const nl = Math.hypot(nx, ny) || 1; nx /= nl; ny /= nl;\n    const kick = CFG.bumperKick * (ga.edge ? 1.1 : 1);   // edge rails hit a touch harder\n    ga.flash = 0.25;\n    if (gb.kind === 'hedgehog') {\n      bumperLaunch(b, nx, ny, kick);                     // mirror + boost — whizz off\n      const hh = hhOf(b); if (hh) hh._fastUntil = G.time + 0.85;   // hold the high cap so it keeps ripping\n    } else {\n      const e = enOf(b);\n      const live = CFG.enemyWhizz && e && e._chargedUntil && G.time < e._chargedUntil;\n      if (live) {\n        bumperLaunch(b, nx, ny, kick);                   // knight-struck → full whizz\n        e._fastUntil = G.time + 0.85;\n        e.charge = Math.max(e.charge, 8);                // primed to chain on impact\n        e._chargedUntil = G.time + CFG.enemyWhizzWindow; // refresh — it can keep ricocheting\n        callout(b.position.x, b.position.y - e.r - 6, 'RICOCHET', COL.amber, 12);\n      } else if (e) {\n        // not knight-struck → stays a slow marcher; just a gentle nudge\n        Body.setVelocity(b, { x: b.velocity.x + nx * kick * 0.3, y: b.velocity.y + ny * kick * 0.3 });\n        e.charge = Math.max(e.charge, 4);\n      }\n    }\n  }\n  // knight-struck enemy ricocheting off a wall — the same whizz, off the rails\n  else if (ga.kind === 'wall' && gb.kind === 'enemy' && CFG.enemyWhizz) {\n    const e = enOf(b);\n    if (e && e._chargedUntil && G.time < e._chargedUntil && pair.collision) {\n      let nx = pair.collision.normal.x, ny = pair.collision.normal.y;\n      if (pair.bodyA === b) { nx = -nx; ny = -ny; }      // point away from the wall, toward the enemy\n      bumperLaunch(b, nx, ny, CFG.bumperKick * 0.85);\n      e._fastUntil = G.time + 0.8;\n      e.charge = Math.max(e.charge, 7);\n      e._chargedUntil = G.time + CFG.enemyWhizzWindow;   // keep the ricochet alive wall-to-wall\n    }\n  }\n  // flipper kick — sweep launches both hedgehogs and enemies\n  else if (ga.kind === 'flipper' && (gb.kind === 'hedgehog' || gb.kind === 'enemy')) {\n    const f = ga.side === 'L' ? W.flipL : W.flipR;\n    const w = Math.abs(f.omega);\n    if (w > 1.5) {                       // only while actively sweeping\n      let rx = b.position.x - f.pivot.x, ry = b.position.y - f.pivot.y;\n      const rl = Math.hypot(rx, ry) || 1;\n      let kx = -ry / rl, ky = rx / rl;   // tangent to the arm\n      if (ky > 0) { kx = -kx; ky = -ky; } // force it upward\n      // crisp swat: its own speed budget, not the gravity-limited field cap\n      const speed = Math.min(13 + w * rl * 0.09, 30);\n      Body.setVelocity(b, { x: b.velocity.x * 0.15 + kx * speed, y: b.velocity.y * 0.15 + ky * speed });\n      if (gb.kind === 'hedgehog') { const hh = hhOf(b); if (hh) hh._fastUntil = G.time + 0.4; }\n      if (gb.kind === 'enemy') { const e = enOf(b); if (e) e.charge = Math.max(e.charge, 6 + w * 0.4); }\n    }\n  }\n}\n\n// O(1) body→wrapper lookups (ref stamped on body.gd at spawn). Falls back to a\n// linear scan only if a body predates the ref (shouldn't happen in practice).\nfunction hhOf(body) { return (body.gd && body.gd.ref) || G.hedgehogs.find(h => h.body === body); }\nfunction enOf(body) { return (body.gd && body.gd.ref) || G.enemies.find(e => e.body === body); }\n\n// ── subtle homing ───────────────────────────────────────────────────────────\n// A live, travelling knight gently curves toward the nearest enemy that is\n// already roughly AHEAD of it (inside a forward cone) and within range. We rotate\n// the velocity vector by a small, capped angle each frame — speed is preserved,\n// so the path bends toward a near-miss without ever reversing, yanking sideways,\n// or changing how fast the knight is going. Off-cone / behind enemies are ignored\n// on purpose: that's what keeps it a nudge, not a guided missile.\nfunction steerHoming(h, dt) {\n  if (!CFG.homing || h.spent) return;\n  const v = h.body.velocity;\n  const sp2 = v.x * v.x + v.y * v.y;\n  if (sp2 < 9) return;                             // only while actually in flight (speed > 3)\n  const sp = Math.sqrt(sp2);\n  const dirx = v.x / sp, diry = v.y / sp;          // current heading\n  const range = CFG.homingRange, range2 = range * range;\n  let best = null, bestScore = -2;\n  for (const e of G.enemies) {\n    if (e.spawn > 0.25) continue;                  // skip enemies still phasing in\n    let tx = e.body.position.x - h.body.position.x;\n    let ty = e.body.position.y - h.body.position.y;\n    const d2 = tx * tx + ty * ty;\n    if (d2 < 1 || d2 > range2) continue;           // squared range gate — no sqrt for far foes\n    const d = Math.sqrt(d2);\n    tx /= d; ty /= d;\n    const align = dirx * tx + diry * ty;           // 1 = dead ahead, <0 = behind\n    const cone = h.wideHoming ? CFG.homingCone - 0.2 : CFG.homingCone;   // loadout: Long Sight widens it\n    if (align < cone) continue;                    // never steer toward off-axis/behind targets\n    const score = align - (d / range) * 0.4;       // prefer well-aligned AND close\n    if (score > bestScore) { bestScore = score; best = { tx, ty }; }\n  }\n  if (!best) return;\n  // rotate heading toward the target by at most maxTurn this frame (speed kept)\n  const cur = Math.atan2(diry, dirx);\n  const tgt = Math.atan2(best.ty, best.tx);\n  let diff = tgt - cur;\n  while (diff > Math.PI) diff -= Math.PI * 2;\n  while (diff < -Math.PI) diff += Math.PI * 2;\n  const maxTurn = 1.6 * CFG.homingStrength * dt;   // radians allowed this frame — small = subtle\n  const turn = Math.max(-maxTurn, Math.min(maxTurn, diff));\n  const na = cur + turn;\n  Body.setVelocity(h.body, { x: Math.cos(na) * sp, y: Math.sin(na) * sp });\n}\n\n// ── signature passives ──────────────────────────────────────────────────────\nfunction firePassive(h) {\n  const p = h.hero.passive;\n  const x = h.body.position.x, y = h.body.position.y;\n  if (p.kind === 'shockwave') {\n    const R = 96 * CFG.entityScale, R2 = R * R;\n    for (const e of G.enemies) {\n      const dx = e.body.position.x - x, dy = e.body.position.y - y;\n      const d2 = dx * dx + dy * dy;\n      if (d2 < R2) {\n        const d = Math.sqrt(d2);\n        const nx = dx / (d || 1), ny = dy / (d || 1);\n        Body.setVelocity(e.body, { x: e.body.velocity.x + nx * 7, y: e.body.velocity.y + ny * 7 });\n        damageEnemy(e, 5, h);\n        e.status.offbal = Math.max(e.status.offbal, 2.0);\n        e.charge = Math.max(e.charge, 6);\n      }\n    }\n    h.shockwaveAnim = 0.45;\n    callout(x, y - h.r - 10, 'SHOCKWAVE', h.hero.color, 13);\n    addParticles(x, y, h.hero.accent, 14, 4);\n  } else if (p.kind === 'slowpuff') {\n    h.puffs = h.puffs || [];\n    h.puffs.push({ x, y, life: 2.4, max: 2.4, r: 34 * CFG.entityScale });\n    const pr = 50 * CFG.entityScale, pr2 = pr * pr;\n    for (const e of G.enemies) {\n      const dx = e.body.position.x - x, dy = e.body.position.y - y;\n      if (dx * dx + dy * dy < pr2)\n        e.status.slow = Math.max(e.status.slow, 2.4);\n    }\n  } else if (p.kind === 'pierce') {\n    h.pierceReady = true;\n    h.pierceAnim = 0.5;\n    callout(x, y - h.r - 10, 'PIERCE READY', h.hero.color, 12);\n  }\n}\n\n// ── per-frame update ─────────────────────────────────────────────────────────\nfunction update(dt) {\n  G.time += dt;\n  // deferred launch hold (Option A): once the just-launched knight has streaked\n  // clear of the corner — x past the inset line, or a short time cap — snap the\n  // held tableau on. By now there's open field around it to aim a slingshot into.\n  if (G._holdArm) {\n    const a = G._holdArm;\n    if (!a.hh || !G.hedgehogs.includes(a.hh)) {\n      G._holdArm = null;                                   // knight gone — abandon\n    } else if (a.hh.body.position.x <= a.xTarget || G.time >= a.deadline) {\n      G._launchHold = true; _last = 0; G._holdArm = null;  // freeze, now well inset\n    }\n  }\n  // wave flow\n  if (G.state === 'wavebreak') {\n    G.breakTimer -= dt;\n    // still let player launch / reposition during the break\n    if (G.breakTimer <= 0) beginNextWave();\n  }\n  if (G.state === 'playing') {\n    if (G.spawnQueue.length > 0) {\n      G.spawnTimer -= dt;\n      if (G.spawnTimer <= 0) {\n        spawnEnemy(G.spawnQueue.shift());\n        G.spawnTimer = CFG.spawnEvery;\n      }\n    } else if (G.enemies.length === 0) {\n      // wave cleared\n      if (G.waveIndex >= WAVES.length - 1) { G.state = 'won'; }\n      else {\n        startWaveBreak(3.4);\n        // Tell the onboarding layer (HTML shell) a wave just cleared. It decides,\n        // ONCE on the guided first run, whether to run the deferred \"field your\n        // knights\" tour after the first wave — so a new player reads the threat\n        // first, then learns launch+flippers, instead of all of it at once.\n        if (window.__onWaveCleared) { try { window.__onWaveCleared(G.waveIndex); } catch (_) {} }\n      }\n    }\n  }\n\n  // flippers — heat only (sweep happens per physics substep in loop())\n  for (const f of [W.flipL, W.flipR]) {\n    if (f.active) {\n      f.heat = Math.min(100, f.heat + CFG.flipHeatBuild * dt * 6);\n      if (f.heat >= 100) { f.active = false; f.locked = true; }   // overheated → LOCKED out\n    } else {\n      f.heat = Math.max(0, f.heat - (100 / Math.max(0.4, CFG.flipCoolTime)) * dt);\n      // once overheated, stay locked until the heat falls BELOW the re-enable line\n      // (a brief forced gap — use the hog boost, don't just mash the paddle).\n      if (f.locked && f.heat <= CFG.flipReenable) f.locked = false;\n    }\n  }\n\n  // enemy march + status + breach\n  for (let i = G.enemies.length - 1; i >= 0; i--) {\n    const e = G.enemies[i];\n    e.spawn = Math.max(0, e.spawn - dt);\n    e.charge = Math.max(0, e.charge - dt * 3);\n    if (e.flash) e.flash = Math.max(0, e.flash - dt);\n    // status decay — unrolled. The old `for (const k of ['stun','offbal',...])`\n    // allocated a fresh 4-element array for EVERY enemy EVERY frame (~1000/sec on\n    // a full wave). That throwaway garbage was a steady GC-pressure source whose\n    // collection pauses landed unpredictably — exactly the \"sometimes\" hitch.\n    const st = e.status;\n    if (st.stun > 0)   st.stun   = Math.max(0, st.stun - dt);\n    if (st.offbal > 0) st.offbal = Math.max(0, st.offbal - dt);\n    if (st.slow > 0)   st.slow   = Math.max(0, st.slow - dt);\n    if (st.mark > 0)   st.mark   = Math.max(0, st.mark - dt);\n    // march downward unless stunned\n    if (e.status.stun <= 0) {\n      let m = e.def.march * CFG.enemySpeed;\n      if (e.status.slow > 0) m *= 0.45;\n      const f = e.body.mass * m * 0.0009;\n      // UPPER FIELD — no centre-pull. Fresh marchers spill out of the vent in random\n      // directions and wander (a slowly-rotating personal heading + the spawn scatter\n      // + wall/bumper bounces) while descending slowly. Only once they cross\n      // CFG.scatterDepth of the field do they start homing toward their lane.\n      const scatterY = PF.TOP + (PF.BOTTOM - PF.TOP) * CFG.scatterDepth;\n      if (e.body.position.y < scatterY) {\n        e.wander += dt * e.wanderRate;\n        const wx = Math.cos(e.wander) * e.body.mass * 0.00007;\n        Body.applyForce(e.body, e.body.position, { x: wx, y: f * 0.7 });\n      } else {\n      // LOWER FIELD — the familiar lane homing + funnel convergence.\n      // gentle homing toward this enemy's own lane along the breach line (set at\n      // spawn within a broad band) — spreads the wave across the line instead of\n      // funnelling everyone onto the middle of the bumpers.\n      // BUT once a marcher descends into the funnel/flipper pinch its off-centre\n      // lane sits BEHIND a paddle — it would jam against the flipper trying to\n      // reach it. So below the pinch we lerp the goal to the drain-gap CENTRE and\n      // pull harder, so it converges into the gap and drops straight down past the\n      // paddles instead of snagging on them.\n      const pinchTop = PF.FUNNEL_Y - 160;     // start converging just above the funnel mouth\n      let goalX = e.targetX, hStr = 0.000004;\n      if (e.body.position.y > pinchTop) {\n        const t = Math.min(1, (e.body.position.y - pinchTop) / 220);\n        goalX = e.targetX + (PF.VENT_X - e.targetX) * t;   // → drain-gap centre (440)\n        hStr = 0.000004 + 0.000010 * t;                    // pull progressively harder\n      }\n      const hx = (goalX - e.body.position.x) * hStr * e.body.mass;\n      Body.applyForce(e.body, e.body.position, { x: hx, y: f });\n      }\n    }\n    // cap speed — knight-struck enemies mid-ricochet get the higher budget, briefly.\n    // Squared compare → no sqrt unless actually over the cap.\n    const ecap = (e._fastUntil && G.time < e._fastUntil) ? 30 : 22;\n    const evx = e.body.velocity.x, evy = e.body.velocity.y;\n    const esp2 = evx * evx + evy * evy;\n    if (esp2 > ecap * ecap) { const sp = Math.sqrt(esp2); Body.setVelocity(e.body, { x: evx / sp * ecap, y: evy / sp * ecap }); }\n    containBody(e.body, e.r);            // hard net — flipper kicks can't punt them off-map\n    // breach\n    if (e.body.position.y > PF.BOTTOM + 6) {\n      G.health = Math.max(0, G.health - e.def.breach);\n      G.stats.breaches++;\n      G.shake = Math.min(1, G.shake + 0.5);\n      callout(e.body.position.x, PF.BOTTOM - 18, '-' + e.def.breach, COL.red, 16);\n      Composite.remove(W.world, e.body);\n      G.enemies.splice(i, 1);\n      if (G.health <= 0) { G.health = 0; G.state = 'lost'; }\n    }\n  }\n\n  // hedgehogs — energy, status, passive timers, base return, slow field\n  const docked = G._dock || (G._dock = {});\n  for (let i = G.hedgehogs.length - 1; i >= 0; i--) {\n    const h = G.hedgehogs[i];\n    steerHoming(h, dt);                            // subtle in-flight curve toward a near-ahead enemy\n    const cap = (h._fastUntil && G.time < h._fastUntil) ? 32 : 21;\n    clampSpeed(h.body, cap);                       // boosted knights ride faster, briefly\n    containBody(h.body, h.r);                       // hard net — can't leave the field\n    h.riseAnim = Math.max(0, h.riseAnim - dt);\n    if (h.flash) h.flash = Math.max(0, h.flash - dt);\n    if (h.shockwaveAnim) h.shockwaveAnim = Math.max(0, h.shockwaveAnim - dt);\n    if (h.pierceAnim) h.pierceAnim = Math.max(0, h.pierceAnim - dt);\n    h.status.slow = Math.max(0, h.status.slow - dt);\n    h.status.mark = Math.max(0, h.status.mark - dt);\n    if (h.puffs) {\n      for (let j = h.puffs.length - 1; j >= 0; j--) {\n        h.puffs[j].life -= dt;\n        if (h.puffs[j].life <= 0) h.puffs.splice(j, 1);\n      }\n    }\n    // (slow terrain only affects enemies marching down — knights pass through freely)\n    // passive\n    if (!h.spent && h.energy > 0) {\n      const hvx = h.body.velocity.x, hvy = h.body.velocity.y;\n      const moving = hvx * hvx + hvy * hvy > 6.25;   // speed > 2.5, no sqrt\n      const cond = h.hero.passive.kind === 'slowpuff' ? moving\n                 : h.hero.passive.kind === 'pierce' ? (h.energy > heroEnergyMax(h.hero) * 0.5)\n                 : true;\n      if (cond) {\n        h.passiveTimer -= dt;\n        if (h.passiveTimer <= 0) {\n          firePassive(h);\n          h.passiveTimer = h.hero.passive.cd * CFG.passiveScale;\n        }\n      }\n    }\n    // return to base (drained through the gap)\n    if (h.body.position.y > PF.BOTTOM + 14) { returnToBase(h, i); continue; }\n    if (h.spent && h.energy > 0) h.spent = false;\n  }\n  // apply enemy slow fields to enemies too\n  for (const e of G.enemies) {\n    for (const sf of W.slowFields) {\n      if (inSlowRect(e.body.position.x, e.body.position.y, e.r, sf)) {\n        e.status.slow = Math.max(e.status.slow, 0.3);\n      }\n    }\n  }\n\n  // docked heroes regen energy (return-to-base refill)\n  for (const id of G.queue) {\n    const max = heroEnergyMax(HEROES[id]);\n    if (docked[id] == null) docked[id] = max;\n    docked[id] = Math.min(max, docked[id] + CFG.refillRate * dt);\n  }\n\n  // trickster contact-slow puffs slow nearby enemies continuously.\n  // O(hedgehogs × puffs × enemies) — was the heaviest per-frame loop when an\n  // ability is live AND enemies cluster (i.e. near the paddles): a Math.hypot per\n  // pair. Now a squared-radius compare with no sqrt and no per-pair allocation.\n  for (const h of G.hedgehogs) {\n    if (h.puffs) for (const p of h.puffs) {\n      for (const e of G.enemies) {\n        const dx = e.body.position.x - p.x, dy = e.body.position.y - p.y;\n        const rr = p.r + e.r;\n        if (dx * dx + dy * dy < rr * rr)\n          e.status.slow = Math.max(e.status.slow, 1.2);\n      }\n    }\n  }\n\n  // callouts / particles / shake decay\n  for (let i = G.callouts.length - 1; i >= 0; i--) {\n    const c = G.callouts[i]; c.life -= dt; c.y -= dt * 22;\n    if (c.life <= 0) G.callouts.splice(i, 1);\n  }\n  for (let i = G.particles.length - 1; i >= 0; i--) {\n    const p = G.particles[i]; p.life -= dt; p.x += p.vx; p.y += p.vy; p.vy += 0.15;\n    if (p.vr) p.rot += p.vr;\n    if (p.life <= 0) G.particles.splice(i, 1);\n  }\n  for (const b of W.bumpers) if (b.gd.flash) b.gd.flash = Math.max(0, b.gd.flash - dt);\n  G.shake = Math.max(0, G.shake - dt * 2.2);\n\n  // mission-end hook (one-shot): the DOM campaign layer registers __onMissionWin /\n  // __onMissionLose; we fire exactly once on the transition into a terminal state\n  // so it can record progress and show the win/next or retry card.\n  if ((G.state === 'won' || G.state === 'lost') && !G._ended) {\n    G._ended = true;\n    const fn = G.state === 'won' ? window.__onMissionWin : window.__onMissionLose;\n    if (typeof fn === 'function') { try { fn(); } catch (_) {} }\n  }\n}\n\n// ── main loop ───────────────────────────────────────────────────────────────\nlet _last = 0, _acc = 0;\nfunction loop(ts) {\n  requestAnimationFrame(loop);\n  if (!_last) _last = ts;\n  let frameDt = (ts - _last) / 1000; _last = ts;\n  if (frameDt > 0.05) frameDt = 0.05;\n\n  // slow-mo while aiming a boost — driven by Matter's native timeScale (below),\n  // NOT by shrinking the delta. Shrinking the delta made the fixed-step\n  // accumulator reach a step only every ~7 frames, so the world lurched then\n  // froze — that discrete hop was the aim jitter. timeScale keeps the engine\n  // stepping every frame and just scales each step down → smooth slow motion.\n  let scale = 1;\n  if (G.aim.active) scale = CFG.slowmoAim ? 0.06 : 0.5;\n\n  if ((G.state === 'playing' || G.state === 'wavebreak') && !G._paused && !G._launchHold) {\n    W.engine.timing.timeScale = scale;\n    // fixed substeps at REAL frame time (full frequency); timeScale does the slow-mo\n    _acc += frameDt;\n    const step = 1 / 140;\n    let n = 0;\n    // cap at 6 substeps — exactly enough to drain a maxed 0.05 s frame. Lower\n    // ceiling = a hitch costs at most 6 solver passes, so the loop recovers\n    // instead of spiralling into a stall.\n    while (_acc >= step && n < 6) {\n      driveFlipper(W.flipL, step);\n      driveFlipper(W.flipR, step);\n      Engine.update(W.engine, step * 1000);\n      _acc -= step; n++;\n    }\n    // anti-spiral: drop leftover accumulated time if we hit the ceiling rather\n    // than carrying a permanent backlog that pins every later frame at the cap.\n    if (_acc > step) _acc = 0;\n    update(frameDt * scale);\n  }\n  render(G);\n  if (!G._splashGone) {\n    G._splashGone = true;\n    const s = document.getElementById('boot');\n    if (s) s.style.display = 'none';\n  }\n}\n\n// ── input wiring ───────────────────────────────────────────────────────────\nfunction initInput(canvas) {\n  const keymap = {\n    ArrowLeft: 'L', a: 'L', A: 'L',\n    ArrowRight: 'R', d: 'R', D: 'R', l: 'R', L: 'R',\n  };\n  window.addEventListener('keydown', (e) => {\n    if (e.repeat) return;\n    const side = keymap[e.key];\n    if (side) {\n      const f = side === 'L' ? W.flipL : W.flipR;\n      if (!f.locked) f.active = true;\n      releaseLaunchHold();\n      e.preventDefault();\n    } else if (e.code === 'Space') {\n      G.plunger.charging = true; e.preventDefault();\n    } else if (e.key === 'r' || e.key === 'R') {\n      if (G.state === 'won' || G.state === 'lost') resetGame();\n    } else if (e.key === 'Enter') {\n      if (G.state === 'ready') resetGame();\n    }\n  });\n  window.addEventListener('keyup', (e) => {\n    const side = keymap[e.key];\n    if (side) { (side === 'L' ? W.flipL : W.flipR).active = false; }\n    else if (e.code === 'Space') {\n      tryLaunch(G.plunger.power);\n      G.plunger.charging = false; G.plunger.power = 0;\n    }\n  });\n  // charge plunger\n  setInterval(() => {\n    if (G.plunger.charging) G.plunger.power = Math.min(1, G.plunger.power + 0.04);\n  }, 16);\n\n  // ── pointer input (mouse + touch via Pointer Events) ──────────────────────\n  // screen → world conversion through the render letterbox transform\n  function toWorld(ev) {\n    const r = canvas.getBoundingClientRect();\n    const sx = (ev.clientX - r.left) / r.width * VIEW.W;\n    const sy = (ev.clientY - r.top) / r.height * VIEW.H;\n    return { x: sx, y: sy };\n  }\n  const FIELD_MIDX = (PF.LEFT + PF.RIGHT) / 2;\n  const inLaunch  = (w) => Math.hypot(w.x - CTRL.LAUNCH.x, w.y - CTRL.LAUNCH.y) <= CTRL.LAUNCH.r + 8;\n  const inPaddles = (w) => w.y >= CTRL.PADDLE_TOP && w.y <= CTRL.PADDLE_BOTTOM && w.x >= PF.LEFT && w.x <= PF.RIGHT;\n  const inField   = (w) => w.y >= PF.TOP && w.y < CTRL.PADDLE_TOP && w.x >= PF.LEFT && w.x <= PF.RIGHT;\n\n  // multi-touch routing: each active pointer is tagged with what it controls\n  const ptr = {};            // pointerId -> { type:'flip'|'aim'|'plunge', side? }\n\n  canvas.addEventListener('pointerdown', (e) => {\n    e.preventDefault();\n    if (G.state === 'won' || G.state === 'lost') { resetGame(); return; }\n    if (G.state === 'ready') { resetGame(); }\n    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}\n    const w = toWorld(e);\n    // 1) launch button (bottom-right) — hold to charge → release to launch\n    if (inLaunch(w)) {\n      G.plunger.charging = true;\n      ptr[e.pointerId] = { type: 'plunge' };\n      return;\n    }\n    // 2) bottom paddle band — left half / right half toggles a flipper\n    if (inPaddles(w)) {\n      const side = w.x < FIELD_MIDX ? 'L' : 'R';\n      const f = side === 'L' ? W.flipL : W.flipR;\n      if (!f.locked) f.active = true;\n      releaseLaunchHold();\n      ptr[e.pointerId] = { type: 'flip', side };\n      return;\n    }\n    // 3) field — pull to boost the nearest live knight (flick gesture)\n    if (inField(w) && !G.aim.active && (G.state === 'playing' || G.state === 'wavebreak')) {\n      releaseLaunchHold();\n      aimStart(w.x, w.y);\n      ptr[e.pointerId] = { type: 'aim' };\n    }\n  });\n\n  canvas.addEventListener('pointermove', (e) => {\n    const p = ptr[e.pointerId];\n    if (p && p.type === 'aim') { const w = toWorld(e); aimMove(w.x, w.y); e.preventDefault(); }\n  });\n\n  function endPointer(e) {\n    const p = ptr[e.pointerId];\n    if (!p) return;\n    delete ptr[e.pointerId];\n    if (p.type === 'plunge') {\n      tryLaunch(G.plunger.power);\n      G.plunger.charging = false; G.plunger.power = 0;\n    } else if (p.type === 'aim') {\n      aimRelease();\n    } else if (p.type === 'flip') {\n      (p.side === 'L' ? W.flipL : W.flipR).active = false;\n    }\n  }\n  canvas.addEventListener('pointerup', endPointer);\n  canvas.addEventListener('pointercancel', endPointer);\n}\n\n// ── boot ────────────────────────────────────────────────────────────────────\nfunction boot() {\n  if (G._booted) return;\n  G._booted = true;\n  // Responsive: size the canvas to the device's aspect ratio BEFORE any geometry\n  // is built, so walls/flippers/bumpers are placed against the real field height.\n  computeLayout(window.innerWidth, window.innerHeight);\n  buildWorld();\n  Events.on(W.engine, 'collisionStart', onCollision);\n  const canvas = document.getElementById('game');\n  initRender(canvas);\n  initInput(canvas);\n  window.__onTweaksApplied = () => {\n    rebuildFlippers(); updateGravity(); updateWallBounce();\n    if (W._edgeBumpersOn !== CFG.edgeBumpers) { W._edgeBumpersOn = CFG.edgeBumpers; rebuildBumpers(); }\n    invalidateBackground();   // skin / geometry change → repaint the static cache\n  };\n  W._edgeBumpersOn = CFG.edgeBumpers;\n  resetGame();\n  G.state = 'wavebreak';\n  // Hold the wave clock while the first-run walkthrough is on screen. The DOM\n  // onboarding layer (in the HTML shell) unpauses via __startGame when the\n  // player dismisses it; a returning player / restart is never paused.\n  G._paused = true;\n  render(G);                                   // draw one frame synchronously\n  const splash = document.getElementById('boot');\n  if (splash) splash.style.display = 'none';\n  requestAnimationFrame(loop);\n  installResponsiveResize();\n}\n\n// ── responsive relayout on viewport change ────────────────────────────────────\n// On a genuine aspect change (orientation flip, desktop window resize) recompute\n// the layout and rebuild the static geometry in place — live actors persist; only\n// the field height and bottom cluster move. Debounced, and gated by a threshold so\n// trivial jitter (and the mobile URL-bar, handled in computeLayout) never rebuilds.\nfunction relayoutWorld() {\n  const before = VIEW.H;\n  computeLayout(window.innerWidth, window.innerHeight);\n  if (VIEW.H === before) { b.className = '';\n      if (mode === 'intro') { try { localStorage.setItem(LS_KEY, '1'); } catch (e) {} }\n      if (window.__missionLive) {\n        // a real in-mission tour (intro tutorial / replayed help / boost tip) —\n        // resume the wave clock and keep the \"?\" replay button available.\n        help.classList.add('on');\n        if (window.__setPaused) window.__setPaused(false);\n      } else {\n        // the tour was a preview launched from the title — return to the title.\n        showStart();\n      }\n    }\n\n    // Tour bridge — the campaign layer triggers the first-run spotlight tour once\n    // the opening mission is live, and reads/marks the \"seen\" flag.\n    window.__hkTour = {\n      run: function (m) { return startTour(m || 'intro'); },\n      seen: function () { try { return !!localStorage.getItem(LS_KEY); } catch (e) { return false; } },\n      markSeen: function () { try { localStorage.setItem(LS_KEY, '1'); } catch (e) {} }\n    };\n    // Let the campaign layer return to this title screen.\n    window.__showTitle = showStart;\n\n    // ── begin a fresh run ───────────────────────────────────────────────────\n    function launch() {\n      onb.className = '';\n      try { localStorage.setItem(LS_KEY, '1'); } catch (e) {}\n      help.classList.add('on');\n      if (window.__startGame) window.__startGame();\n    }\n\n    // reposition spotlight on resize/orientation change while a tour is live\n    window.addEventListener('resize', function () {\n      if (onb.classList.contains('tour') && steps.length) renderStep();\n    });\n    help.onclick = function () { startTour('help'); };\n\n    // First-launch contextual tip — game.js calls __onLaunch on every successful\n    // launch; we fire the boost/energy/chain explainer exactly once, and only if\n    // nothing else (start screen / a tour) is already up.\n    var BOOST_KEY = 'hk_boost_tip_v1';\n    window.__onLaunch = function () {\n      var seen = false; try { seen = !!localStorage.
