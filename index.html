  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 50;\n    font-family: 'IM Fell English', serif; letter-spacing: 0.12em;\n    transition: opacity .4s ease; text-transform: uppercase;\n  }\n  #boot.hidden { opacity: 0; pointer-events: none; }\n  #boot small { font-family: 'Manrope', sans-serif; letter-spacing: .06em;\n    font-size: 12px; color: #A9823C; text-transform: none; }\n\n  /* ── First-run onboarding: start screen + guided tooltips ─────────────── */\n  #onb { position: fixed; inset: 0; z-index: 2147483647; display: none;\n    font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }\n  #onb.on { display: block; }\n  #onb-dim { position: absolute; inset: 0; background: rgba(13,15,18,0.82);\n    transition: opacity .3s ease; }\n  #onb-spot { position: absolute; border: 2px solid #BC5B38; border-radius: 999px;\n    box-shadow: 0 0 0 9999px rgba(13,15,18,0.80), inset 0 0 26px rgba(246,201,92,0.30);\n    pointer-events: none; opacity: 0;\n    transition: top .34s cubic-bezier(0.32,0.72,0.27,1),\n                left .34s cubic-bezier(0.32,0.72,0.27,1),\n                width .34s cubic-bezier(0.32,0.72,0.27,1),\n                height .34s cubic-bezier(0.32,0.72,0.27,1),\n                opacity .25s ease; }\n  #onb.tour #onb-dim { opacity: 0; pointer-events: none; }\n  #onb.tour #onb-spot { opacity: 1; }\n  .onb-card { position: absolute; left: 50%; transform: translateX(-50%);\n    width: min(390px, 88vw); background: #FAF6EB; color: #2C2620;\n    border: 2px solid #14506B; border-radius: 10px; padding: 20px 22px 16px;\n    max-height: 92vh; max-height: 92dvh; overflow-y: auto; overscroll-behavior: contain;\n    box-shadow: 0 18px 54px rgba(0,0,0,0.46);\n    transition: top .34s cubic-bezier(0.32,0.72,0.27,1); }\n  .onb-card.center { top: 50%; transform: translate(-50%,-50%);\n    width: min(450px, 92vw); padding: 30px 30px 24px; }\n  .onb-sigil { display: block; margin: 0 auto 14px; }\n  .onb-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;\n    color: #A9823C; font-weight: 700; }\n  .onb-title { font-family: 'IM Fell English', Cinzel, serif; color: #14506B;\n    margin: 6px 0 9px; line-height: 1.04; }\n  .onb-card .onb-title { font-size: 29px; }\n  .onb-card.center .onb-title { font-size: 46px; text-align: center; }\n  .onb-card.center .onb-eyebrow { text-align: center; }\n  .onb-body { font-size: 15px; line-height: 1.52; color: #4a4034; text-wrap: pretty; }\n  .onb-card.center .onb-body { text-align: center; font-size: 16px;\n    max-width: 34ch; margin: 0 auto; }\n  .onb-foot { display: flex; align-items: center; gap: 12px; margin-top: 18px; }\n  .onb-card.center .onb-foot { flex-direction: column; gap: 14px; margin-top: 22px; }\n  .onb-dots { display: flex; gap: 6px; flex: 1; }\n  .onb-card.center .onb-dots { display: none; }\n  .onb-dot { width: 7px; height: 7px; border-radius: 50%; background: #C9BB9C; }\n  .onb-dot.cur { background: #BC5B38; }\n  .onb-btn { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14px;\n    letter-spacing: 0.02em; border-radius: 7px; padding: 11px 18px; cursor: pointer;\n    border: 2px solid transparent; min-height: 44px; transition: background .18s ease, color .18s ease; }\n  .onb-btn.primary { background: #BC5B38; color: #FAF6EB; border-color: #BC5B38; }\n  .onb-btn.primary:hover { background: #8D3F23; border-color: #8D3F23; }\n  .onb-btn.primary:active { background: #8D3F23; box-shadow: inset 0 2px 0 rgba(0,0,0,0.18); }\n  .onb-btn.ghost { background: transparent; color: #6B6258; border-color: transparent; padding: 11px 6px; white-space: nowrap; }\n  .onb-btn.ghost:hover { color: #2C2620; }\n  /* back-to-title nav: reads clearly as \"leave to the main menu\" */\n  .onb-btn.back { display: inline-flex; align-items: center; gap: 7px;\n    background: transparent; color: #14506B; border: 1.5px solid #C9BB9C;\n    padding: 10px 15px 10px 12px; }\n  .onb-btn.back svg { width: 15px; height: 15px; flex: 0 0 auto; }\n  .onb-btn.back:hover { color: #BC5B38; border-color: #B n-width: 28px; height: 28px; padding: 0 7px; font-family: 'Manrope', sans-serif;\n    font-weight: 700; font-size: 13px; color: #2C2620; background: #FFFDF7;\n    border: 1.5px solid #14506B; border-radius: 6px; box-shadow: 0 1.5px 0 #BBA877;\n    white-space: nowrap; }\n  .kc.wide { font-size: 11px; letter-spacing: 0.04em; }\n  .kc.terra { border-color: #BC5B38; color: #8D3F23; }\n  .kc-sep { color: #9A9588; font-size: 12px; font-weight: 600; }\n  .kc svg { display: block; }\n\n  /* ── Campaign meta layer: briefing · profile · loadout · win/lose ─────────── */\n  #camp { position: fixed; inset: 0; z-index: 2147483647; display: none;\n    font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }\n  #camp.on { display: flex; align-items: center; justify-content: center; }\n  #camp-dim { position: absolute; inset: 0;\n    background: radial-gradient(120% 90% at 50% 0%, #1a1f25 0%, #0b0d10 78%); }\n  .camp-card { position: relative; z-index: 1; width: min(468px, 94vw);\n    max-height: 94vh; max-height: 94dvh; overflow-y: auto; overscroll-behavior: contain;\n    -webkit-overflow-scrolling: touch;\n    background: #FAF6EB; color: #2C2620; border: 2px solid #14506B; border-radius: 14px;\n    box-shadow: 0 26px 70px rgba(0,0,0,0.55); padding: 26px 26px 22px; }\n  .camp-card::-webkit-scrollbar { width: 0; }\n  .camp-seal { display: block; margin: 0 auto 14px; }\n  .camp-eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;\n    color: #BC5B38; font-weight: 700; }\n  .camp-title { font-family: 'IM Fell English', Cinzel, serif; color: #14506B;\n    font-size: 33px; line-height: 1.05; margin: 5px 0 4px; }\n  .camp-place { font-family: 'IM Fell English', serif; font-style: italic;\n    font-size: 14px; color: #9A9588; margin-bottom: 16px; }\n  .camp-divider { height: 1px; background: #D9CDB0; margin: 16px 0; border: 0; }\n\n  /* hero roundel (procedural — mirrors the canvas hero cell) */\n  .camp-roundel { display: block; }\n\n  /* dialogue — DISPATCH style (compact field report) */\n  .camp-dispatch { background: #FFFDF7; border: 1.5px solid #D9CDB0; border-radius: 8px;\n    padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }\n  .camp-line { display: flex; gap: 14px; align-items: flex-start; }\n  .camp-line .camp-roundel { flex: 0 0 auto; }\n  .camp-line-body { flex: 1; padding-top: 1px; }\n  .camp-name { display: block; font-family: 'Manrope', sans-serif; font-weight: 700;\n    font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: #14506B;\n    margin-bottom: 3px; }\n  .camp-name em { font-style: italic; font-weight: 400; letter-spacing: 0.04em;\n    color: #9A9588; text-transform: none; }\n  .camp-quote { font-family: 'IM Fell English', serif; font-style: italic;\n    font-size: 16px; line-height: 1.45; color: #2C2620; text-wrap: pretty; }\n\n  /* dialogue — PORTRAIT style (theatrical, big speaker) */\n  .camp-portrait-line { display: flex; gap: 16px; align-items: center; padding: 6px 0; }\n  .camp-portrait-line.right { flex-direction: row-reverse; text-align: right; }\n  .camp-portrait-line .camp-line-body { padding-top: 0; }\n  .camp-portrait-line .camp-quote { font-size: 19px; line-height: 1.4; }\n  .camp-portrait-line.right .camp-name em { }\n\n  .camp-note { font-family: 'IM Fell English', serif; font-style: italic;\n    font-size: 13px; color: #6B6258; margin: 16px 2px 0;\n    display: flex; gap: 9px; align-items: flex-start; }\n  .camp-note svg { flex: 0 0 auto; margin-top: 2px; }\n\n  /* The action bar is pinned to the bottom of the (scrollable) card so the primary\n     button is always reachable — on short/landscape viewports the loadout content\n     overflows and the button used to fall below the fold, where iOS momentum scroll\n     bounced it back out of reach. Sticky keeps it in view with no scrolling needed. */\n  .camp-foot { display: flex; align-items: center; justify-content: flex-end;\n    gap: 12px; position: sticky; bottom: -2 r-radius: 4px; padding: 3px 7px; }\n  .camp-noteff .ne-txt { font-family: 'IM Fell English', serif; font-style: italic; font-size: 13px;\n    color: #6B6258; line-height: 1.35; }\n  .camp-tabs { display: flex; gap: 8px; margin: 4px 0 16px; }\n  .camp-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;\n    padding: 10px 6px; background: #FFFDF7; border: 1.5px solid #D9CDB0; border-radius: 9px;\n    cursor: pointer; transition: border-color .18s ease, background .18s ease; }\n  .camp-tab.active { border-color: #BC5B38; border-width: 2px; background: #FFF7EE; }\n  .camp-tab .t-name { font-family: 'IM Fell English', serif; font-size: 15px; color: #14506B; }\n  .camp-tab.active .t-name { color: #BC5B38; }\n  .camp-loadrow { margin-top: 14px; }\n  .camp-rowhead { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 10.5px;\n    letter-spacing: 0.16em; text-transform: uppercase; color: #6B6258; margin-bottom: 9px;\n    display: flex; align-items: baseline; gap: 8px; }\n  .camp-rowhead em { font-family: 'IM Fell English', serif; font-style: italic; font-size: 12px;\n    color: #9A9588; letter-spacing: 0.02em; text-transform: none; font-weight: 400; }\n  .camp-abilities { display: flex; flex-direction: column; gap: 9px; }\n  .camp-ability { position: relative; display: flex; gap: 13px; align-items: flex-start;\n    background: #FFFDF7; border: 1.5px solid #14506B; border-radius: 10px; padding: 12px 14px;\n    cursor: pointer; transition: background .16s ease; }\n  .camp-ability:hover { filter: brightness(0.985); }\n  .camp-ability.selected { border: 2.5px solid #BC5B38; background: #FFF7EE; }\n  .camp-ability.selected::before { content: ''; position: absolute; left: -2.5px; right: -2.5px;\n    top: -2.5px; height: 4px; background: #BC5B38; border-radius: 10px 10px 0 0; }\n  .camp-ability.locked { background: #F4EFDF; border: 1.5px dashed #BBB6A6; cursor: not-allowed; }\n  .camp-ability.locked .camp-ab-meta { opacity: 0.55; }\n  . 0 0 auto; font-family: 'Manrope', sans-serif; font-weight: 700;\n    font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 9px; border-radius: 999px; }\n  .camp-m-tag.cleared { color: #57602f; background: #E7ECD3; }\n  .camp-m-tag.next { color: #FAF6EB; background: #BC5B38; }\n  .camp-m-tag.locked { color: #9A9588; background: transparent; border: 1px dashed #C9BB9C; }\n\n  /* win / lose / finale */\n  .camp-card.result { text-align: center; }\n  .camp-result-kicker { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 11px;\n    letter-spacing: 0.2em; text-transform: uppercase; color: #BC5B38; }\n  .camp-result-title { font-family: 'IM Fell English', serif; font-size: 42px; line-height: 1.04;\n    margin: 8px 0 6px; }\n  .camp-result-title.held { color: #14506B; }\n  .camp-result-title.fell { color: #CF4D2C; }\n  .camp-result-sub { font-family: 'IM Fell English', serif; font-style: italic; font-size: 16px;\n    color: #4a4034; max-width: 32ch; margin: 0 auto 4px; text-wrap: pretty; }\n  .camp-statline { display: flex; justify-content: center; gap: 22px; margin: 18px 0 4px; }\n  .camp-statline .s { font-family: 'JetBrains Mono', monospace; }\n  .camp-statline .s b { display: block; font-size: 26px; color: #14506B; font-weight: 600; }\n  .camp-statline .s span { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #9A9588; }\n  .camp-card.result .camp-foot { justify-content: center; margin-top: 22px; flex-direction: column; gap: 10px; }\n  .camp-card.result .onb-btn.primary { width: 100%; }\n  /* unlock banner inside win card */\n  .camp-unlock { display: flex; gap: 13px; align-items: center; text-align: left;\n    background: #EEF3F6; border: 1.5px solid #14506B; border-radius: 10px; padding: 12px 14px;\n    margin: 18px 0 2px; }\n  .camp-unlock .camp-roundel { flex: 0 0 auto; }\n  .camp-unlock .u-ey { font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;\n    color: #BC5B38; font-weight: 700; }\n  .camp-unlock .u-name { font-family: 'IM Fell English', serif; font-size: 19px; color: #14506B; line-height: 1.1; }\n  .camp-unlock .u-desc { font-size: 12px; color: #6B6258; margin-top: 1px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div id=\"stage\">\n    <canvas id=\"game\"><\u002Fcanvas>\n  <\u002Fdiv>\n  <div id=\"boot\"><div style=\"font-size:26px\">Hedgepin Knights<\u002Fdiv><small>loading the playfield…<\u002Fsmall><\u002Fdiv>\n\n  <!-- First-run onboarding overlay (start screen + guided tooltips) -->\n  <div id=\"onb\">\n    <div id=\"onb-dim\"><\u002Fdiv>\n    <div id=\"onb-spot\"><\u002Fdiv>\n    <div id=\"onb-card\" class=\"onb-card center\"><\u002Fdiv>\n  <\u002Fdiv>\n  <button id=\"onb-help\" class=\"onb-help\" title=\"How to play\" aria-label=\"How to play\">?<\u002Fbutton>\n\n  <!-- Campaign meta layer (briefing | profile | loadout | win/lose). Lives outside\n       the game-logic CDATA rebuild markers, so a src/ rebuild never touches it. -->\n  <div id=\"camp\">\n    <div id=\"camp-dim\"><\u002Fdiv>\n    <div id=\"camp-card\" class=\"camp-card\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Matter.js physics (pinned) -->\n  <script src=\"953efe6d-30e6-4779-8dfb-09ea88f5660b\"><\u002Fscript>\n\n  <!-- Game logic (inlined to avoid per-file serve-token fetches) -->\n  <script>\n//<![CDATA[\n\n/* ===== config.js ===== */\n/* ============================================================\n   Hedgepin Knights — Prototype  ·  config.js\n   Tuning constants (CFG), hero + enemy data, tweak sync.\n   Plain global script — shares scope with world.js / game.js / render.js.\n   ============================================================ */\n\n// Internal render resolution — PORTRAIT phone canvas. WIDTH is fixed at the\n// design-system Mission HUD width (880); HEIGHT is RESPONSIVE — recomputed from\n// the device's aspect ratio by computeLayout() so the field fills tall and short\n// phones edge-to-edge instead of letterboxing into fat black bars. 1884 is just\n// the reference height the magic numbers were dialed at; it's overwritten on boot.\nconst VIEW = { W: 880, H: 1884 };\n\n// Vertical band layout (top → bottom), mirroring the Mission HUD chrome:\n//   chrome (wave + hero cells) · vent · PLAYFIELD · plunger · cost+health\nconst BANDS = {\n  CHROME_TOP: 30,  CHROME_H: 96,     // wave card (left) + 3 hero cells (right)\n  VENT_TOP:   146, VENT_H: 86,       // iron vent grate + spawn lamps\n  PLUNGE_TOP: 1528, PLUNGE_H: 116,   // launch pull-zone strip (touch-drag)\n  STRIP_TOP:  1546,                  // health rampart — sits in the control deck with a\n  STRIP_H:    46,                    //   clear gap above (room for the taller battlement crown).\n                                     //   The paddle pads now rise to just below the bar, so the\n                                     //   deck below the rampart is mostly filled by the pads.\n};\n\n// Playfield geometry (physics-space, same units as VIEW). A tall portrait\n// rectangle: vent feeds enemies in at the top, flippers + breach line at base.\nconst PF = {\n  WALL: 16,\n  LEFT: 28,\n  RIGHT: 852,          // full-width field (no side plunger lane in portrait)\n  TOP: 250,            // playfield top (just below the vent band)\n  BOTTOM: 1496,        // breach line — enemies past this damage the pool\n  VENT_X: 440,         // vent mouth — horizontal centre of the field\n  VENT_Y: 232,         // grate mouth sits in the vent band, feeding the top\n  // flipper pivots + the defended gap (the drain / base mouth)\n  FLIP_L: { x: 300, y: 1376 },\n  FLIP_R: { x: 580, y: 1376 },\n  GAP_L: 376,\n  GAP_R: 504,\n};\n\n// On-screen touch controls (portrait). The whole field is a pull-to-boost\n// surface; the deck directly below the field is split into two big paddle pads\n// (L/R flippers); the charge/launch button lives ON the canvas, in the sealed\n// dead-space just right of the right flipper (no ball can reach there).\nconst CTRL = {\n  PADDLE_TOP: 1604,                       // top of the paddle pads — raised UP to fill the deck:\n                                          //   the pads now climb close under the health rampart\n                                          //   (only a thin margin below the bar), reclaiming the\n                                          //   previously-empty band as extra thumb area\n  PADDLE_BOTTOM: 1864,                    // bottom of the paddle pads — extend to the deck floor,\n                                          //   reclaiming the old DRAIN marker + controls-hint strip\n  LAUNCH: { x: 726, y: 1420, r: 76 },     // launch button — on the canvas, just right of the paddles;\n                                          //   enlarged for big-thumb reach (was r62), nudged up so the\n                                          //   bigger disc still seats clear of the field floor\n};\n\n// ── Responsive vertical layout ──────────────────────────────────────────────\n// The canvas WIDTH is fixed (880 design units); the HEIGHT tracks the device's\n// aspect ratio so the playfield fills the screen instead of letterboxing into\n// black bars. Picture the layout as three stacked zones:\n//   • TOP cluster   — chrome · vent · field top : anchored to the TOP edge (fixed)\n//   • PLAYFIELD     — the open field            : stretches / compresses\n//   • BOTTOM cluster— flippers · paddle deck · launch button · breach rampart :\n//                     a RIGID unit anchored to the BOTTOM edge\n// Only the open field changes height; bumpers reposition proportionally inside\n// it. Every band keeps the spacing it was tuned with — a short phone just gets a\n// shorter field, a tall phone a longer one.\nconst DESIGN_H = 1884;          // reference height the magic numbers were tuned at\nconst FIELD_TOP0 = PF.TOP;      // 250 — fixed top of the open field\n// Bumpers live in the OPEN PINBALL AREA above the funnel pinch — they must scale\n// against THAT region (TOP → FUNNEL_Y), not the whole field. The funnels/flippers\n// are bottom-anchored at fixed offsets, so scaling bumpers against the full field\n// let the lowest edge bumpers drift past the funnel mouth into the sealed triangle\n// (out of play) on short screens. 964 = 1214(funnel) − 250(top) at design scale.\nconst PLAY_H0 = 1214 - PF.TOP;  // reference playable height (FUNNEL_Y - PF.TOP)\n\n// Bottom-anchored reference Y's. On every layout pass each is shifted by the same\n// delta (= H − DESIGN_H) so the whole base assembly slides as one block.\nconst ANCHOR = {\n  PF_BOTTOM: 1496, FLIP_Y: 1376, FUNNEL_Y: 1214,\n  PADDLE_TOP: 1604, PADDLE_BOTTOM: 1864, LAUNCH_Y: 1420,\n  // STRIP (health rampart) is a chrome band at the top of the control deck —\n  // below the field, above the paddle pads. Bottom-anchored like the rest of the\n  // base assembly (same delta) so it tracks on any phone height.\n  PLUNGE_TOP: 1528, STRIP_TOP: 1546,\n};\n\n// Clamp the responsive height so the open field is never unplayably short nor\n// wastefully tall. At H_MIN the field is ~922px; at H_MAX ~1482px (vs 1246 ref).\nconst H_MIN = 1560, H_MAX = 2120;\n\n// Track the tallest viewport height we've seen on TOUCH devices, so the iOS/Android\n// URL-bar collapsing (which grows innerHeight) doesn't thrash a rebuild every time\n// — we lock to the full-height layout and just letterbox when the bar reappears.\n// Desktop uses the live height so deliberate window resizing stays responsive.\nlet _maxVH = 0;\nconst _isTouch = typeof matchMedia === 'function' && matchMedia('(pointer: coarse)').matches;\n\n// Derive VIEW.H + all bottom-anchored geometry from the current viewport. Returns\n// the chosen height. Call BEFORE buildWorld(), and again on a real resize.\nfunction computeLayout(vw, vh) {\n  if (_isTouch) { _maxVH = Math.max(_maxVH, vh); vh = _maxVH; }\n  const aspect = (vh > 0 && vw > 0) ? vh / vw : DESIGN_H / VIEW.W;\n  const H = Math.round(Math.max(H_MIN, Math.min(H_MAX, VIEW.W * aspect)));\n  VIEW.H = H;\n  const delta = H - DESIGN_H;\n  PF.BOTTOM   = ANCHOR.PF_BOTTOM + delta;\n  PF.FLIP_L.y = ANCHOR.FLIP_Y + delta;\n  PF.FLIP_R.y = ANCHOR.FLIP_Y + delta;\n  PF.FUNNEL_Y = ANCHOR.FUNNEL_Y + delta;\n  CTRL.PADDLE_TOP    = ANCHOR.PADDLE_TOP + delta;\n  CTRL.PADDLE_BOTTOM = ANCHOR.PADDLE_BOTTOM + delta;\n  CTRL.LAUNCH.y      = ANCHOR.LAUNCH_Y + delta;\n  BANDS.PLUNGE_TOP   = ANCHOR.PLUNGE_TOP + delta;\n  BANDS.STRIP_TOP    = ANCHOR.STRIP_TOP + delta;\n  PF.FIELD_SCALE = (PF.FUNNEL_Y - FIELD_TOP0) / PLAY_H0;   // bumper scale: tracks the funnel mouth\n  return H;\n}\n\n// Map a design-space field Y (tuned against the reference field) into the current\n// stretched/compressed field. Used to reposition bumpers so they keep their\n// proportional spacing on every screen.\nfunction fieldY(designY) {\n  return FIELD_TOP0 + (designY - FIELD_TOP0) * (PF.FIELD_SCALE || 1);\n}\n\n// Seed FUNNEL_Y / FIELD_SCALE for any code that reads them before the first\n// computeLayout (e.g. a synchronous early build). Harmless to run again.\nPF.FUNNEL_Y = ANCHOR.FUNNEL_Y;\nPF.FIELD_SCALE = 1;\n\n// ── Live tuning config. Mutated by tweak sync; read every frame. ────────────\nconst CFG = {\n  // physics / damage\n  enemyMass: 1.0,        // ×mass on all enemies (knockback resistance)\n  hitImpulse: 0.7,       // ×knockback force imparted by hedgehog hits\n  chainMult: 2.0,        // damage multiplier when enemy knocked into enemy\n  chainKnock: 1.0,       // ×outward speed floored onto a knight-struck enemy so it\n                         // becomes a real chain projectile (this is what makes\n                         // \"chain, don't poke\" lethal — 0 = old poke-only behaviour)\n  gravity: 0.34,         // fall speed / table tilt (lower = slower, floatier)\n  // pinball edge liveliness\n  wallBounce: 0.55,      // restitution of the side rails (0.2 = dead, ~0.8 = springy)\n  bumperKick: 9.0,       // impulse a bumper imparts on contact — knights whizz off harder now\n  edgeBumpers: true,     // rail bumpers hugging the side walls (pings balls back in)\n  // enemy ricochet trial — a knight-struck enemy that THEN hits a bumper or wall\n  // gets the same whizz treatment a knight does (brief). Marching enemies that\n  // were not hit by a knight stay slow.\n  enemyWhizz: true,      // master toggle for the trial\n  enemyWhizzWindow: 2.6, // seconds after a knight hit during which a bumper/wall launches the enemy\n  // energy economy\n  energyMax: 100,        // base energy pool (per-hero multipliers apply)\n  refillRate: 34,        // energy/sec restored while at base\n  drainOnHit: 1.0,       // ×energy lost when an enemy strikes a hedgehog\n  // boost\n  boostCost: 18,         // energy per boost\n  boostStrength: 0.8,    // ×boost impulse\n  launchPower: 1.0,      // ×plunger launch velocity (how far a knight is flung)\n  // homing — a subtle in-flight steer. A live knight gently bends its heading\n  // toward the nearest enemy that's already roughly AHEAD of it (within a cone),\n  // so near-misses become glancing hits. It rotates the velocity vector only —\n  // speed is preserved, so it nudges the path without ever yanking or speeding up.\n  homing: true,          // master toggle\n  homingStrength: 1.0,   // ×max turn rate (0 = off-feel, 2 = noticeably stickier)\n  homingRange: 300,      // px — only enemies inside this radius are considered\n  homingCone: 0.45,      // min heading-alignment (cos): ~0.45 ≈ within 63° of travel; higher = only dead-ahead\n  // enemy approach — how wide a LINE the marchers aim at along the breach. 0 = all\n  // funnel to dead centre (too easy to read / block); higher = each enemy picks its\n  // own lane across a broad band, so they spread along the line instead of stacking\n  // on the middle of the bumpers.\n  breachSpread: 230,     // px — half-width of the target band around field centre\n  // fresh marchers scatter out of the vent in random directions and are NOT pulled\n  // toward the centre line until they descend past this fraction of the field\n  // (0 = pull immediately like before; 0.5 = no centre-homing for the top half).\n  scatterDepth: 0.5,\n  // flippers\n  flipHeatBuild: 26,     // heat added per flip (0..100) — overheats faster now\n  flipCoolTime: 2.2,     // seconds of idle to cool fully from max\n  flipReenable: 60,      // after overheating, heat must fall BELOW this before the\n                         //   flipper unlocks — a brief forced gap that pushes you to\n                         //   the hog boost instead of mashing the paddle\n  // passives\n  passiveScale: 1.0,     // ×all signature-passive cooldowns\n  // waves / spawning\n  spawnEvery: 1.5,       // seconds between enemy spawns within a wave\n  waveSize: 1.0,         // ×enemies per wave\n  // feel / layout knobs (the user's open questions)\n  flipperLen: 118,       // flipper length px\n  flipMaxTip: 12,        // px — max blade-tip travel per physics substep (anti clip-through; lower = safer, softer snap)\n  entityScale: 1.0,      // ×size of hedgehogs + enemies\n  enemySpeed: 1.0,       // ×enemy march speed (distance/pacing feel)\n  // presentation\n  skin: 'skinned',       // 'skinned' | 'greybox'\n  showIcons: true,       // in-world status + loadout iconography on/off\n  slowmoAim: true,       // pause/slow time while aiming a boost\n  // launch hold — after a knight is flung, freeze the world (a held tableau) so\n  // the player can move their thumbs from the LAUNCH button onto the paddles.\n  // Released by the next gameplay input: a flipper tap/key OR a boost-aim grab.\n  launchHold: true,\n  // how far across the top band the knight streaks before the held tableau snaps\n  // on (Option A). 0 = freeze at the corner (old behaviour); ~0.28 = a bit in,\n  // leaving open field on every side to pull a slingshot into.\n  launchHoldInset: 0.28,\n};\n\n// ── Palette (mirrors design-system tokens; used by canvas render) ───────────\nconst COL = {\n  limestone:  '#E8DCC4',\n  limestoneL: '#FAF6EB',\n  limestoneD: '#C s = 6;\n  engine.constraintIterations = 2;\n  W.engine = engine;\n  W.world = engine.world;\n}\n\nfunction updateGravity() {\n  if (W.engine) W.engine.gravity.y = CFG.gravity;\n}\n\n// live-update the springiness of the side rails (tweakable without a rebuild)\nfunction updateWallBounce() {\n  for (const b of W.walls) {\n    if (b.gd && b.gd.deco === 'rail') b.restitution = CFG.wallBounce;\n  }\n}\n\nfunction wall(x, y, w, h, opts = {}) {\n  const b = Bodies.rectangle(x, y, w, h, {\n    isStatic: true,\n    restitution: opts.rest ?? 0.2,\n    friction: opts.friction ?? 0.05,\n    angle: opts.angle || 0,\n    chamfer: opts.chamfer,\n  });\n  gdata(b, { kind: 'wall', deco: opts.deco });\n  return b;\n}\n\n// approximate a circular arc with short rotated wall segments (degrees in)\nfunction arcWall(cx, cy, radius, deg0, deg1, segs, opts = {}) {\n  const out = [];\n  const a0 = deg0 * Math.PI / 180, a1 = deg1 * Math.PI / 180;\n  const th = opts.thick || PF.WALL;\n  for (let i = 0; i < segs; i++) {\n    const t0 = a0 + (a1 - a0) * i / segs, t1 = a0 + (a1 - a0) * (i + 1) / segs;\n    const x0 = cx + Math.cos(t0) * radius, y0 = cy + Math.sin(t0) * radius;\n    const x1 = cx + Math.cos(t1) * radius, y1 = cy + Math.sin(t1) * radius;\n    out.push(wall((x0 + x1) / 2, (y0 + y1) / 2,\n      Math.hypot(x1 - x0, y1 - y0) + th, th,\n      { angle: Math.atan2(y1 - y0, x1 - x0), rest: opts.rest ?? 0.18, deco: opts.deco }));\n  }\n  return out;\n}\n\nfunction buildWalls() {\n  const t = PF.WALL;\n  const ws = [];\n  const midY = PF.H_MID = (PF.TOP + PF.BOTTOM) / 2;\n  const fieldH = PF.BOTTOM - PF.TOP + t * 2;\n  // outer frame — full-width portrait field (no side plunger lane)\n  ws.push(wall((PF.LEFT + PF.RIGHT) / 2, PF.TOP - t / 2, PF.RIGHT - PF.LEFT + t * 2, t, { rest: CFG.wallBounce, deco: 'rail' })); // top\n  ws.push(wall(PF.LEFT - t / 2,  midY, t, fieldH, { rest: CFG.wallBounce, deco: 'rail' })); // left\n  ws.push(wall(PF.RIGHT + t / 2, midY, t, fieldH, { rest: CFG.wallBounce, deco: 'rail' })); // right\n\n  // ── slingshot funnels feeding straight onto the flipper pivots ──────────────\n  // Each funnel's lower end terminates EXACTLY at a flipper pivot, so the wall\n  // line is continuous with the flipper — no dead pocket outboard of the paddle\n  // for a ball to settle into. The sealed triangle below each funnel is\n  // unreachable (the funnel is a solid diagonal from side wall to pivot).\n  function funnel(x0, y0, x1, y1) {\n    const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;\n    const len = Math.hypot(x1 - x0, y1 - y0) + t;        // +t overlaps the wall join\n    const ang = Math.atan2(y1 - y0, x1 - x0);\n    return wall(cx, cy, len, t, { angle: ang, rest: 0.08, deco: 'sling' });\n  }\n  ws.push(funnel(PF.LEFT  + t, PF.FUNNEL_Y, PF.FLIP_L.x, PF.FLIP_L.y));   // left  → left pivot\n  ws.push(funnel(PF.RIGHT - t, PF.FUNNEL_Y, PF.FLIP_R.x, PF.FLIP_R.y));   // right → right pivot\n\n  W.walls = ws;\n  Composite.add(W.world, ws);\n}\n\n// rebuild walls (responsive relayout changed PF geometry)\nfunction rebuildWalls() {\n  for (const b of W.walls) Composite.remove(W.world, b);\n  buildWalls();\n}\n\nfunction buildBumpers() {\n  // Bumper Y's are tuned in design-field space; fieldY() maps them into the\n  // current stretched/compressed field so they keep proportional spacing and\n  // never collide with the flippers on a short screen or float on a tall one.\n  const defs = [\n    { x: 440, y: fieldY(560),  r: 34 },\n    { x: 250, y: fieldY(824),  r: 28 },\n    { x: 630, y: fieldY(824),  r: 28 },\n    { x: 440, y: fieldY(1086), r: 30 },\n  ];\n  // ── edge rail bumpers — hug the side walls so balls drifting down the edges\n  // get pinged back into play (the \"more bumpers round the edges\" pinball feel).\n  // Tucked flush to each wall; staggered in height so the two sides don't mirror\n  // into a dead vertical channel.\n  if (CFG.edgeBumpers) {\n    const lx = PF.LEFT + 26, rx = PF.RIGHT - 26, er = 22;\n    defs.push(\n      { x: lx, y: fieldY(640),  r: er, edge: true },\n      { x: lx, y: fieldY(968),  r: er, edge: true },\n      { x: rx, y: fieldY(504),  r: er, edge: true },\n      { x: rx, y: fieldY(832),  r: er, edge: true },\n      { x: rx, y: fieldY(1140), r: er, edge: true },\n      { x: lx, y: fieldY(1140), r: er, edge: true },\n    );\n  }\n  W.bumpers = defs.map(d => {\n    const b = Bodies.circle(d.x, d.y, d.r, {\n      isStatic: true, restitution: 1.25, friction: 0,\n    });\n    gdata(b, { kind: 'bumper', r: d.r, flash: 0, edge: !!d.edge });\n    return b;\n  });\n  Composite.add(W.world, W.bumpers);\n  // slow field (mud / tangled vines / cold bleed from the vent) — now a broad\n  // rectangle covering the TOP HALF of the field: enemies marching down from the\n  // vent wade through sticky terrain before reaching the open lower field, and\n  // launched knights lose steam up top unless boosted. Rect is {x,y,w,h} (top-left).\n  const sfTop = PF.TOP + 8;\n  const sfBottom = PF.TOP + (PF.BOTTOM - PF.TOP) * 0.5;   // halfway down the field\n  W.slowFields = [{\n    x: PF.LEFT + 8, y: sfTop,\n    w: (PF.RIGHT - PF.LEFT) - 16, h: sfBottom - sfTop,\n  }];\n}\n\n// rebuild bumpers (edge-rail toggle changed via tweaks)\nfunction rebuildBumpers() {\n  for (const b of W.bumpers) Composite.remove(W.world, b);\n  buildBumpers();\n}\n\nfunction makeFlipper(side) {\n  const pivot = side === 'L' ? PF.FLIP_L : PF.FLIP_R;\n  const len = CFG.flipperLen;\n  const thick = 22;\n  const restAngle = side === 'L' ? 0.56 : Math.PI - 0.56;\n  const upAngle = side === 'L' ? -0.34 : Math.PI + 0.34;\n  // KINEMATIC flipper: a static body we sweep about the pivot manually each\n  // substep. Stable (no constraint drift) and balls get a clean kick from the\n  // sweep (penetration resolution) plus a velocity assist in the collision code.\n  const body = Bodies.rectangle(pivot.x, pivot.y, len, thick, {\n    isStatic: true, restitution: 0.1, friction: 0.4,\n    chamfer: { radius: thick / 2 },\n  });\n  gdata(body, { kind: 'flipper', side });\n  const f = {\n    body, side, pivot, len, thick,\n    restAngle, upAngle,\n    angle: restAngle, prevAngle: restAngle, omega: 0,\n    active: false, heat: 0, locked: false,\n  };\n  poseFlipper(f);\n  Composite.add(W.world, body);\n  return f;\n}\n\n// place the flipper so its pinned end sits exactly on the pivot\nfunction poseFlipper(f) {\n  const cx = f.pivot.x + Math.cos(f.angle) * (f.len / 2);\n  const cy = f.pivot.y + Math.sin(f.angle) * (f.len / 2);\n  Body.setPosition(f.body, { x: cx, y: cy });\n  Body.setAngle(f.body, f.angle);\n}\n\nfunction buildFlippers() {\n  W.flipL = makeFlipper('L');\n  W.flipR = makeFlipper('R');\n}\n\n// rebuild flippers (length changed via tweaks)\nfunction rebuildFlippers() {\n  for (const f of [W.flipL, W.flipR]) {\n    if (f) Composite.remove(W.world, f.body);\n  }\n  const hL = W.flipL ? W.flipL.heat : 0, hR = W.flipR ? W.flipR.heat : 0;\n  const lL = W.flipL ? W.flipL.locked : false, lR = W.flipR ? W.flipR.locked : false;\n  buildFlippers();\n  W.flipL.heat = hL; W.flipR.heat = hR;\n  W.flipL.locked = lL; W.flipR.locked = lR;\n}\n\n// Sweep the flipper toward rest/up. Called every PHYSICS SUBSTEP. dt in seconds.\nfunction driveFlipper(f, dt) {\n  const target = f.active ? f.upAngle : f.restAngle;\n  // SETTLED FAST-PATH: parked at rest and not firing → nothing to integrate.\n  // The old code re-posed BOTH idle paddles every substep, and each pose call\n  // (Body.setPosition + Body.setAngle) rebuilds the blade's vertices and AABB.\n  // For two paddles × 6 substeps × 60 fps that's ~720 pointless rebuilds/sec —\n  // skipping the no-op is free perf on the overwhelmingly common idle case.\n  if (!f.active && Math.abs(f.angle - target) < 1e-4) {\n    f.prevAngle = f.angle;\n    f.omega = 0;\n    return;\n  }\n  const k = f.active ? 0.55 : 0.30;            // up-swing snappy, return softer\n  f.prevAngle = f.angle;\n  let delta = (target - f.angle) * Math.min(1, k * dt * 120);\n  // ANTI-CLIP: cap  without collapsing into one flat\n// size, and text already above the floor is left untouched.\nconst MIN_TEXT_PX = 10.5;\n\n// Legibility map: design size → adjusted design size for the CURRENT display\n// scale. If the text already clears the floor on screen, return it unchanged.\n// Otherwise lift it to 84–100% of the floor (closer-to-floor text lifts less),\n// which keeps a little of the original ordering among small labels.\nfunction fit(size) {\n  const s = _dispScale;\n  if (!s || s <= 0) return size;\n  const screen = size * s;\n  if (screen >= MIN_TEXT_PX) return size;\n  const floorDesign = MIN_TEXT_PX / s;\n  const t = Math.max(0, Math.min(1, screen / MIN_TEXT_PX));\n  return floorDesign * (0.84 + 0.16 * t);\n}\n// offscreen cache of the STATIC background layers (playfield surface + grid +\n// rosette + vignette, slow fields, walls, vent housing). These don't change\n// frame-to-frame — only when the skin or canvas size changes — so we paint them\n// once and blit the result each frame instead of re-stroking ~60 grid lines and\n// rebuilding two gradients every single frame on a high-DPI canvas.\nlet _bg = null, _bgctx = null, _bgDirty = true, _bgSkin = null;\n\nfunction initRender(canvas) {\n  _canvas = canvas;\n  ctx = canvas.getContext('2d');\n  _bg = document.createElement('canvas');\n  _bgctx = _bg.getContext('2d');\n  sizeCanvas();\n  // resize handling is owned by game.js (installResponsiveResize) so the cheap\n  // letterbox refit and the heavier debounced geometry relayout stay coordinated.\n}\n\n// call when something that affects the static background changed (skin, size).\n// Also drops the cached slow-mo gradient, which is keyed to VIEW.H/2 and goes\n// stale when a responsive relayout changes the canvas height.\nfunction invalidateBackground() { _bgDirty = true; _slowmoGrad = null; }\n\nfunction sizeCanvas() {\n  _dpr = Math.min(window.devicePixelRatio || 1, 2);\n  _canvas.width = VIEW.W * _dpr;\n  _canvas.height = VIEW.H * _dpr;\n  if (_bg) { _bg.width = VIEW.W * _dpr; _bg.height = VIEW.H * _dpr; }\n  _bgDirty = true;\n  // fit into viewport preserving aspect\n  const vw = window.innerWidth, vh = window.innerHeight;\n  const s = Math.min(vw / VIEW.W, vh / VIEW.H);\n  _canvas.style.width = (VIEW.W * s) + 'px';\n  _canvas.style.height = (VIEW.H * s) + 'px';\n  _dispScale = s;\n}\n\n// (re)paint the static background layers into the offscreen cache. Runs only\n// when _bgDirty (skin/size change), not every frame. Temporarily points the\n// module `ctx` at the cache context so the existing draw fns paint into it.\nfunction ensureBackground() {\n  if (!_bgDirty && _bgSkin === CFG.skin) return;\n  const real = ctx;\n  ctx = _bgctx;\n  ctx.setTransform(_dpr, 0, 0, _dpr, 0, 0);\n  ctx.clearRect(0, 0, VIEW.W, VIEW.H);\n  drawPlayfield();\n  drawSlowFields();\n  drawWalls();\n  drawVentHousing();\n  ctx = real;\n  _bgDirty = false;\n  _bgSkin = CFG.skin;\n}\n\nconst FONT_UI = 'Manrope, sans-serif';\nconst FONT_DISP = \"'IM Fell English', Cinzel, serif\";\nconst FONT_MONO = \"'JetBrains Mono', monospace\";\n\nfunction isSkinned() { return CFG.skin === 'skinned'; }\n\n// ── helpers ────────────────────────────────────────────────────────────────\nfunction rr(x, y, w, h, r) {\n  ctx.beginPath();\n  ctx.moveTo(x + r, y);\n  ctx.arcTo(x + w, y, x + w, y + h, r);\n  ctx.arcTo(x + w, y + h, x, y + h, r);\n  ctx.arcTo(x, y + h, x, y, r);\n  ctx.arcTo(x, y, x + w, y, r);\n  ctx.closePath();\n}\nfunction txt(s, x, y, size, color, font = FONT_UI, align = 'left', weight = '600', spacing = 0) {\n  size = fit(size);\n  ctx.font = `${weight} ${size}px ${font}`;\n  ctx.fillStyle = color; ctx.textAlign = align; ctx.textBaseline = 'alphabetic';\n  if (spacing) {\n    ctx.save(); let cx = x;\n    if (align === 'center') { let tot = 0; for (const ch of s) tot += ctx.measureText(ch).width + spacing; cx = x - tot / 2; }\n    ctx.textAlign = 'left';\n    for (const ch of s) { ctx.fillText(ch, cx, y); cx += ctx.measureText(ch).width + spacing; }\n    ctx.restore();\n  } else ctx.fillText(s, x, y);\n}\n\n// On-brand stroked chevron (matches assets/icons/ui-back.svg: stroked path, no\n// fill, round caps/joins) — replaces the platform-emoji ◀ ▶ glyphs that render\n// as Apple's system triangles. `dir` = -1 points left, +1 points right.\nfunction chevron(cx, cy, size, dir, color, lineW) {\n  const hx = size * 0.42 * dir, hy = size * 0.62;\n  ctx.save();\n  ctx.strokeStyle = color;\n  ctx.lineWidth = lineW;\n  ctx.lineCap = 'round';\n  ctx.lineJoin = 'round';\n  ctx.beginPath();\n  ctx.moveTo(cx + hx, cy - hy);\n  ctx.lineTo(cx - hx, cy);\n  ctx.lineTo(cx + hx, cy + hy);\n  ctx.stroke();\n  ctx.restore();\n}\n\n// ── main ─────────────────────────────────────────────────────────────────────\nfunction render(G) {\n  ensureBackground();\n  ctx.setTransform(_dpr, 0, 0, _dpr, 0, 0);\n  ctx.clearRect(0, 0, VIEW.W, VIEW.H);\n\n  // stage background (outside the playfield) — painted flat first so the brief\n  // screen-shake translate never exposes an unpainted canvas edge.\n  ctx.fillStyle = isSkinned() ? COL.limestoneL : '#23262b';\n  ctx.fillRect(0, 0, VIEW.W, VIEW.H);\n\n  ctx.save();\n  if (G.shake > 0) {\n    ctx.translate((Math.random() - 0.5) * G.shake * 10, (Math.random() - 0.5) * G.shake * 10);\n  }\n\n  // static layers (playfield, slow fields, walls, vent housing) come from the\n  // pre-rendered cache in one blit instead of being re-stroked every frame.\n  ctx.drawImage(_bg, 0, 0, VIEW.W, VIEW.H);\n  drawBumpers(G);\n  drawSpawnLamps(G);\n  drawPuffs(G);\n  drawEnemies(G);\n  drawHedgehogs(G);\n  drawFlippers(G);\n  drawBreachLine(G);\n  drawParticles(G);\n  drawAim(G);\n  drawCallouts(G);\n  ctx.restore();\n\n  drawPlunger(G);\n  drawHud(G);\n  drawHeroPanel(G);\n  drawBottomStrip(G);\n  drawOverlays(G);\n}\n\n// ── playfield surface ─────────────────────────────────────────────────────────\nfunction drawPlayfield(G) {\n  const x = PF.LEFT, y = PF.TOP, w = PF.RIGHT - PF.LEFT, h = PF.BOTTOM - PF.TOP;\n  if (isSkinned()) {\n    ctx.fillStyle = COL.limestone;\n    ctx.fillRect(x, y, w, h);\n    // mosaic tile grid\n    ctx.strokeStyle = 'rgba(44,38,32,0.06)'; ctx.lineWidth = 1;\n    for (let gx = x; gx <= x + w; gx += 36) { ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx, y + h); ctx.stroke(); }\n    for (let gy = y; gy <= y + h; gy += 36) { ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x + w, gy); ctx.stroke(); }\n    // central rosette\n    const rcx = (PF.LEFT + PF.RIGHT) / 2, rcy = (PF.TOP + PF.BOTTOM) / 2;\n    ctx.save();\n    ctx.globalAlpha = 0.10; ctx.strokeStyle = COL.terracotta; ctx.lineWidth = 2;\n    ctx.beginPath(); ctx.arc(rcx, rcy, 150, 0, Math.PI * 2); ctx.stroke();\n    ctx.beginPath(); ctx.arc(rcx, rcy, 98, 0, Math.PI * 2); ctx.stroke();\n    ctx.restore();\n    // vignette\n    const g = ctx.createRadialGradient(rcx, rcy, 220, rcx, rcy, Math.max(w, h) * 0.62);\n    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(44,38,32,0.14)');\n    ctx.fillStyle = g; ctx.fillRect(x, y, w, h);\n  } else {\n    ctx.fillStyle = '#33373d';\n    ctx.fillRect(x, y, w, h);\n    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;\n    for (let gx = x; gx <= x + w; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx, y + h); ctx.stroke(); }\n    for (let gy = y; gy <= y + h; gy += 40) { ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x + w, gy); ctx.stroke(); }\n  }\n}\n\nfunction drawSlowFields(G) {\n  for (const sf of W.slowFields) {\n    ctx.save();\n    if (isSkinned()) {\n      ctx.fillStyle = 'rgba(110,114,69,0.32)';\n      ctx.strokeStyle = 'rgba(110,114,69,0.6)';\n    } else { ctx.fillStyle = 'rgba(120,160,80,0.18)'; ctx.strokeStyle = 'rgba(120,160,80,0.5)'; }\n    ctx.lineWidth = 2;\n    ctx.setLineDash([14, 9]);\n    rr(sf.x, sf.y, sf.w, sf.h, 10); ctx.fill(); ctx.stroke();\n    ctx.setLineDash([]);\n    // label tucked into the lower edge of the band so it doesn't fight the action\n    ctx.fillStyle = isSkinned( tx.strokeStyle = '#aab0b8'; ctx.lineWidth = 2; ctx.stroke();\n    }\n    ctx.restore();\n  }\n}\n\n// ── vent grate housing (STATIC — painted into the background cache) ──────────\nfunction drawVentHousing() {\n  const bandY = BANDS.VENT_TOP, bandH = BANDS.VENT_H;\n  const vx = PF.VENT_X;\n\n  // iron vent grate — centred housing leaking cold light down into the field\n  ctx.save();\n  const gw = 196, gh = bandH, gx = vx - gw / 2, gy = bandY;\n  ctx.fillStyle = isSkinned() ? COL.iron : '#3a3e44';\n  rr(gx, gy, gw, gh, 6); ctx.fill();\n  ctx.strokeStyle = isSkinned() ? COL.ironD : '#22252a'; ctx.lineWidth = 3; rr(gx, gy, gw, gh, 6); ctx.stroke();\n  // grille slats\n  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;\n  for (let sx = gx + 14; sx < gx + gw - 10; sx += 14) { ctx.beginPath(); ctx.moveTo(sx, gy + 10); ctx.lineTo(sx, gy + gh - 10); ctx.stroke(); }\n  // rivets\n  if (isSkinned()) { ctx.fillStyle = COL.ironD; for (const rx of [gx + 10, gx + gw - 10]) for (const ry of [gy + 10, gy + gh - 10]) { ctx.beginPath(); ctx.arc(rx, ry, 3, 0, 7); ctx.fill(); } }\n  // label\n  txt('VENT', vx, gy + gh / 2 + 7, 19, COL.paper, FONT_DISP, 'center', '700', 4);\n  // cold-light mouth bleeding into the field below\n  const mg = ctx.createLinearGradient(vx, gy + gh, vx, PF.TOP + 30);\n  mg.addColorStop(0, 'rgba(200,220,235,0.85)'); mg.addColorStop(1, 'rgba(120,150,170,0.05)');\n  ctx.fillStyle = mg; rr(vx - 46, gy + gh - 4, 92, PF.TOP - (gy + gh) + 26, 6); ctx.fill();\n  ctx.restore();\n}\n\n// ── spawn lamps (DYNAMIC — show upcoming enemies, drawn every frame) ─────────\nfunction drawSpawnLamps(G) {\n  const bandY = BANDS.VENT_TOP, bandH = BANDS.VENT_H;\n  // spawn lamps — only the enemies ACTUALLY queued to approach. No text, no empty\n  // placeholder lamps: if nothing's coming, nothing shows.\n  const upcoming = G.spawnQueue.slice(0, 3).filter(Boolean);\n  if (!upcoming.length) return;\n  const ly = bandY + bandH / 2;\n  const gap = 60;\n  const lamp0 = 86;\n  for (let i = 0; i < upcoming.length; i++) {\n    const lx = lamp0 + i * gap;\n    const def = ENEMIES[upcoming[i]];\n    if (!def) continue;\n    ctx.save();\n    if (isSkinned()) {\n      ctx.fillStyle = COL.brass; ctx.beginPath(); ctx.arc(lx, ly, 22, 0, 7); ctx.fill();\n      ctx.fillStyle = 'rgba(246,201,92,0.30)';\n      ctx.beginPath(); ctx.arc(lx, ly, 17, 0, 7); ctx.fill();\n      ctx.strokeStyle = COL.brassL; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(lx, ly, 17, 0, 7); ctx.stroke();\n    } else {\n      ctx.fillStyle = '#4a4e54'; ctx.beginPath(); ctx.arc(lx, ly, 22, 0, 7); ctx.fill();\n      ctx.fillStyle = 'rgba(246,201,92,0.25)';\n      ctx.beginPath(); ctx.arc(lx, ly, 17, 0, 7); ctx.fill();\n      ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(lx, ly, 17, 0, 7); ctx.stroke();\n    }\n    ctx.globalAlpha = i === 0 ? 1 : 0.7;\n    drawEnemyGlyph(lx, ly, def, 9, true);\n    ctx.globalAlpha = 1;\n    if (i === 0) { ctx.strokeStyle = COL.amber; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(lx, ly, 20, 0, 7); ctx.stroke(); }\n    ctx.restore();\n  }\n}\n\nfunction drawEnemyGlyph(x, y, def, r, silhouette) {\n  ctx.save();\n  if (silhouette) ctx.fillStyle = isSkinned() ? COL.soot : '#1a1c1f';\n  else ctx.fillStyle = def.color;\n  // simple animal-ish blob with ears\n  ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();\n  ctx.beginPath(); ctx.arc(x - r * 0.55, y - r * 0.7, r * 0.4, 0, 7); ctx.fill();\n  ctx.beginPath(); ctx.arc(x + r * 0.55, y - r * 0.7, r * 0.4, 0, 7); ctx.fill();\n  ctx.restore();\n}\n\n// ── enemies ─────────────────────────────────────────────────────────────────\nfunction drawEnemies(G) {\n  for (const e of G.enemies) {\n    const { x, y } = e.body.position; const r = e.r;\n    ctx.save();\n    if (e.spawn > 0) ctx.globalAlpha = 1 - e.spawn / 0.5 * 0.6;\n    // body\n    let fill = isSkinned() ? e.def.color : '#9aa0a8';\n    if (e.flash > 0) fill = '#ffffff';\n    ctx.fillStyle = fill;\n    ctx.beginPath(); ctx.arc(x, y,
